<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Star Catcher - Gioco Spaziale</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0a0a1a;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            user-select: none;
            /* Phone-friendly: leave room for the address bar to appear
               and disappear without re-flowing the canvas. */
            padding: 8px;
            box-sizing: border-box;
        }

        canvas {
            border: 2px solid #4a4a8a;
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(74, 74, 138, 0.5);
            cursor: pointer;
            touch-action: none;
            user-select: none;
            /* Mobile-friendly: shrink the canvas inside the viewport while
               keeping the 4:3 aspect ratio of the internal grid.
               Viewport units (vw/vh) are safer than percentages here
               because the parent flex item's intrinsic size can play
               tricks with % sizing in Safari. */
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
        }

        @media (max-width: 768px) {
            #touchControls {
                display: flex !important;
            }

            canvas {
                cursor: default !important;
            }
        }
    </style>
</head>

<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <button id="pauseButton" aria-label="Game Pause"
        style="position: absolute; top: 18px; left: 18px; z-index: 20; width: 64px; height: 64px; border-radius: 50%; border: 3px solid rgba(74, 140, 255, 0.9); background: rgba(10, 10, 26, 0.75); color: #4a8cff; font-family: 'Orbitron', sans-serif; font-size: 28px; font-weight: 900; cursor: pointer; backdrop-filter: blur(10px); box-shadow: 0 0 18px rgba(74, 140, 255, 0.35); display: none; align-items: center; justify-content: center; touch-action: manipulation; user-select: none;">⏸</button>

    <div id="mobileAccountInput"
        style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 30; background: #0a0a1a; padding: 25px; border-radius: 15px; border: 2px solid #4a8cff; box-shadow: 0 0 40px rgba(74, 140, 255, 0.5); width: 320px; text-align: center;">
        <div style="color: white; font-family: 'Orbitron', sans-serif; font-size: 22px; margin-bottom: 20px;">👤 NEW
            ACCOUNT</div>
        <input type="text" id="accountMobileInput" maxlength="12" placeholder="Name (max 12 char)"
            style="width: 100%; background: #1a1a3a; color: white; border: 2px solid #4a8cff; border-radius: 8px; padding: 12px; font-family: 'Orbitron', sans-serif; font-size: 20px; text-align: center; box-sizing: border-box; outline: none;">
        <div style="margin-top: 20px; display: flex; justify-content: center; gap: 15px;">
            <button id="mobileClearNameBtn"
                style="background: #5a4a2a; color: #ffdd88; border: none; border-radius: 10px; padding: 12px 20px; font-family: 'Orbitron', sans-serif; font-size: 14px; cursor: pointer;">🗑️
                Clear Name</button>
            <button id="mobileConfirmBtn"
                style="background: #2a6aff; color: white; border: none; border-radius: 10px; padding: 12px 35px; font-family: 'Orbitron', sans-serif; font-size: 18px; cursor: pointer;">✅
                CONFIRM</button>
            <button id="mobileCancelBtn"
                style="background: #3a3a5a; color: #aaa; border: none; border-radius: 10px; padding: 12px 35px; font-family: 'Orbitron', sans-serif; font-size: 18px; cursor: pointer;">✖
                CANCEL</button>
        </div>
        <div style="margin-top: 15px;">
            <button id="mobileClearAccountBtn"
                style="background: #5a2a2a; color: #ff8888; border: none; border-radius: 10px; padding: 10px 25px; font-family: 'Orbitron', sans-serif; font-size: 14px; cursor: pointer;">🗑️
                Clear Account</button>
        </div>
    </div>

    <div id="touchControls"
        style="position: absolute; bottom: 20px; left: 0; right: 0; display: none; justify-content: space-between; padding: 0 30px; pointer-events: none; z-index: 10;">
        <button id="btnLeft"
            style="pointer-events: auto; width: 120px; height: 120px; border-radius: 50%; border: 4px solid rgba(74, 170, 255, 0.8); background: rgba(74, 170, 255, 0.3); color: rgba(74, 170, 255, 1); font-size: 56px; font-family: 'Orbitron', sans-serif; backdrop-filter: blur(10px); cursor: pointer; user-select: none; touch-action: none;">◀</button>
        <button id="btnRight"
            style="pointer-events: auto; width: 120px; height: 120px; border-radius: 50%; border: 4px solid rgba(74, 170, 255, 0.8); background: rgba(74, 170, 255, 0.3); color: rgba(74, 170, 255, 1); font-size: 56px; font-family: 'Orbitron', sans-serif; backdrop-filter: blur(10px); cursor: pointer; user-select: none; touch-action: none;">▶</button>
    </div>

    <script>
        /* ============================================================
           0. SETUP CANVAS AND CONTEXT
        ============================================================ */
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Detect a touch-first device or narrow viewport — used to dial
        // back background / overlay work on phones. Re-evaluated on
        // resize and orientationchange so a tablet that narrows after
        // boot picks up the same perf tweaks.
        function detectMobile() {
            return ('ontouchstart' in window || navigator.maxTouchPoints > 0)
                || window.innerWidth <= 768;
        }
        let IS_MOBILE = detectMobile();
        window.addEventListener('resize', () => { IS_MOBILE = detectMobile(); });
        window.addEventListener('orientationchange', () => {
            IS_MOBILE = detectMobile();
        });

        // Convert a DOM event (mouse OR touch) into canvas-internal pixel
        // coordinates. Re-evaluates the bounding rect on every call so
        // it stays correct across orientation changes and address-bar
        // resizes, which cost essentially nothing.
        function getGameCoords(event) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if (event.touches && event.touches.length > 0) {
                clientX = event.touches[0].clientX;
                clientY = event.touches[0].clientY;
            } else if (event.changedTouches && event.changedTouches.length > 0) {
                clientX = event.changedTouches[0].clientX;
                clientY = event.changedTouches[0].clientY;
            } else {
                clientX = event.clientX;
                clientY = event.clientY;
            }
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        /* ============================================================
           1. GAME STATE AND GLOBAL VARIABLES
        ============================================================ */
        const GAME_STATES = {
            MENU: 'menu',
            ACCOUNT: 'account',
            PLAYING: 'playing',
            PAUSED: 'paused',
            SETTINGS: 'settings',
            RECORDS: 'records'
        };

        const GAME_MODES = {
            CLASSIC: 'classic',
            SURVIVAL: 'survival'
        };

        let gameState = GAME_STATES.MENU;
        let gameMode = GAME_MODES.CLASSIC;
        let survivalStartTime = 0;        // Date.now() when survival run starts
        let survivalScorePerSecondTick = 0; // accumulator that turns real time into integer seconds
        let currentUser = null;
        let accountInput = '';
        let isPaused = false;
        let touchLeft = false;
        let touchRight = false;
        let mobileInputVisible = false;
        let menuMusicStarted = false;

        // Play-time tracking: how long the player spent in the
        // PLAYING state on the current account. The timer is paused
        // while the game is PAUSED so only active play counts toward
        // the "How much time did you play" totals shown on the
        // Records screen.
        let playingStartedAt = 0;

        // Per-account audio preferences. music = menu background song,
        // sfx = every other in-game sound effect.
        let settings = { music: true, sfx: true };

        const player = {
            x: 400,
            y: 550,
            radius: 100,
            targetX: 400
        };

        let stars = [];
        let meteorites = [];
        let score = 0;
        let lives = 3;
        let gameOver = false;
        let meteoriteHitCooldown = 0; // frames of i-frames after a hit in survival
        let leftPressed = false;
        let rightPressed = false;
        let isNewRecord = false;
        let newRecordPosition = -1;
        const MOVE_SPEED = 5;
        const RECORD_NOTIFICATION_DURATION = 3000; // 3 seconds
        let inGameRecordShown = false;        // banner visibility flag
        let inGameRecordShownAt = 0;          // ms timestamp when the banner started

        const rocketEmoji = {
            x: 0,
            y: 0,
            baseX: 0,
            baseY: 170,
            size: 60,
            isEscaping: false,
            vx: 0,
            vy: 0,
            escapeTimer: 0,
            angle: 0
        };

        let menuButtons = [];

        // ----- Blue mascot: a cute side-character who chats from the
        // lower-left corner of the menu screen. Hover over him to see a
        // little speech bubble with a randomly chosen line.
        const BLUE_LINES = [
            'Hi, my name is Blue.',
            'Try the new SURVIVAL mode!',
            'A project for HackClub.',
            'Beware the meteorites...',
            'Catch them all!',
            'Made with love by HackClub.',
            'Three lives, infinite stars!',
            'Tip: arrow keys also work.',
            'Watch out - those rocks hurt.'
        ];
        const blueCharacter = {
            cx: 95,
            cy: 530,
            radius: 36,
            bodyRadius: 30,
            bobPhase: 0,
            currentLine: BLUE_LINES[0],
            currentLineIndex: 0,
            isHovering: false,
            lastShownIndex: -1,
            bubbleAlpha: 0,
            bubbleFadeTarget: 0
        };

        function pickNewBlueLine() {
            if (BLUE_LINES.length <= 1) {
                blueCharacter.currentLineIndex = 0;
                blueCharacter.currentLine = BLUE_LINES[0];
                return;
            }
            let next = blueCharacter.currentLineIndex;
            while (next === blueCharacter.currentLineIndex) {
                next = Math.floor(Math.random() * BLUE_LINES.length);
            }
            blueCharacter.currentLineIndex = next;
            blueCharacter.lastShownIndex = next;
            blueCharacter.currentLine = BLUE_LINES[next];
        }

        function updateBlueCharacter(now) {
            blueCharacter.bobPhase = now / 600;
            // On mobile, the bubble was forced open by a tap and should
            // auto-close after the short window so the screen doesn't
            // stay sticky.
            if (IS_MOBILE && blueCharacter.isHovering
                && blueCharacter.hoverResetAt
                && now > blueCharacter.hoverResetAt) {
                blueCharacter.isHovering = false;
            }
            const target = blueCharacter.isHovering ? 1 : 0;
            blueCharacter.bubbleFadeTarget = target;
            const cur = blueCharacter.bubbleAlpha;
            const step = 0.08;
            if (cur < target) blueCharacter.bubbleAlpha = Math.min(target, cur + step);
            else if (cur > target) blueCharacter.bubbleAlpha = Math.max(target, cur - step);
        }

        function blueHoverHitTest(mx, my) {
            const dx = mx - blueCharacter.cx;
            const dy = my - (blueCharacter.cy + Math.sin(blueCharacter.bobPhase) * 6);
            return (dx * dx + dy * dy) < (blueCharacter.radius * blueCharacter.radius);
        }

        /* ============================================================
           2. AUDIO SETUP
        ============================================================ */
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            // Risveglia l'AudioContext se è in stato sospeso
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // Elemento audio per la musica del menu
        let menuAudio = null;

        function initMenuAudio() {
            if (!menuAudio) {
                menuAudio = new Audio('menu-song.mp3');
                menuAudio.loop = true;
                menuAudio.volume = 0.3; // Volume ridotto per non far sovrastare i suoni del gioco
            }
        }

        function playMenuMusic() {
            if (!settings.music) {
                // Music is disabled — make sure nothing is playing.
                if (menuAudio && !menuAudio.paused) {
                    menuAudio.pause();
                    menuAudio.currentTime = 0;
                }
                return;
            }
            if (menuAudio && menuAudio.paused) {
                initMenuAudio();
                menuAudio.play().catch(e => console.log('Menu music play failed:', e));
            }
        }

        function stopMenuMusic() {
            if (menuAudio && !menuAudio.paused) {
                menuAudio.pause();
                menuAudio.currentTime = 0;
            }
        }

        // Suono di raccolta stellina - caricato dal file star-sound.txt
        let starSound = null;

        function loadStarSound() {
            if (!starSound) {
                // Leggi il contenuto del file come blob (richiede che il file sia servito correttamente)
                fetch('star-sound.txt')
                    .then(response => response.blob())
                    .then(blob => {
                        starSound = new Audio(URL.createObjectURL(blob));
                    })
                    .catch(e => {
                        // Fallback: crea un suono sintetico se il file non è disponibile
                        console.log('Star sound file not available, using synthesized sound');
                        starSound = null;
                    });
            }
        }

        function playCollectSound() {
            if (!settings.sfx) return;
            try {
                initAudio();
                // Prova a usare il suono caricato, altrimenti genera un suono sintetico
                if (starSound) {
                    starSound.currentTime = 0;
                    starSound.play().catch(() => { });
                } else {
                    // Suono sintetico di fallback
                    const oscillator = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    oscillator.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                    gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.15);
                }
            } catch (e) { }
        }

        function playLoseLifeSound() {
            if (!settings.sfx) return;
            try {
                initAudio();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(300, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.3);
            } catch (e) { }
        }

        function playGameOverSound() {
            if (!settings.sfx) return;
            try {
                initAudio();
                const notes = [440, 400, 350, 300, 250];
                for (let i = 0; i < notes.length; i++) {
                    const oscillator = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    oscillator.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    oscillator.type = 'sawtooth';
                    oscillator.frequency.setValueAtTime(notes[i], audioCtx.currentTime + i * 0.12);
                    gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime + i * 0.12);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.12 + 0.12);
                    oscillator.start(audioCtx.currentTime + i * 0.12);
                    oscillator.stop(audioCtx.currentTime + i * 0.12 + 0.12);
                }
            } catch (e) { }
        }

        function playRecordSound() {
            if (!settings.sfx) return;
            try {
                initAudio();
                const notes = [523, 659, 784, 1047];
                for (let i = 0; i < notes.length; i++) {
                    const oscillator = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    oscillator.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    oscillator.type = 'square';
                    oscillator.frequency.setValueAtTime(notes[i], audioCtx.currentTime + i * 0.15);
                    gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime + i * 0.15);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.15 + 0.2);
                    oscillator.start(audioCtx.currentTime + i * 0.15);
                    oscillator.stop(audioCtx.currentTime + i * 0.15 + 0.2);
                }
            } catch (e) { }
        }

        function playClickSound() {
            if (!settings.sfx) return;
            try {
                initAudio();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.frequency.setValueAtTime(600, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.05);
                gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.08);
            } catch (e) { }
        }

        /* ============================================================
           3. RECORDS GESTION (localStorage)
        ============================================================ */
        function getAllRecords() {
            const data = localStorage.getItem('starCatcherAllRecords');
            return data ? JSON.parse(data) : {};
        }

        function saveAllRecords(records) {
            localStorage.setItem('starCatcherAllRecords', JSON.stringify(records));
        }

        function getUserRecords(username) {
            const all = getAllRecords();
            if (!all[username]) {
                all[username] = Array(10).fill(0);
                saveAllRecords(all);
            }
            return all[username];
        }

        function setUserRecords(username, records) {
            const all = getAllRecords();
            all[username] = records;
            saveAllRecords(all);
        }

        function addScoreToUser(username, newScore) {
            if (newScore <= 0) return -1;

            let records = getUserRecords(username);
            const previousMin = records.length >= 10 ? records[9] : 0;

            records.push(newScore);
            records.sort((a, b) => b - a);
            records = records.slice(0, 10);
            setUserRecords(username, records);

            if (newScore <= previousMin && records.length >= 10) {
                return -1;
            }

            return records.indexOf(newScore);
        }

        function getMaxScore(username) {
            if (!username) return 0;
            const records = getUserRecords(username);
            return records.length > 0 ? records[0] : 0;
        }

        // Survival mode uses a separate bucket of records (per-mode top-10),
        // identified by a `${user}__survival` key in the same localStorage object.
        function getSurvivalRecords(username) {
            const key = `${username}__survival`;
            const all = getAllRecords();
            if (!all[key]) {
                all[key] = Array(10).fill(0);
                saveAllRecords(all);
            }
            return all[key];
        }

        function setSurvivalRecords(username, records) {
            const key = `${username}__survival`;
            const all = getAllRecords();
            all[key] = records;
            saveAllRecords(all);
        }

        function addSurvivalScoreToUser(username, newScore) {
            if (newScore <= 0) return -1;

            let records = getSurvivalRecords(username);
            const previousMin = records.length >= 10 ? records[9] : 0;

            records.push(newScore);
            records.sort((a, b) => b - a);
            records = records.slice(0, 10);
            setSurvivalRecords(username, records);

            if (newScore <= previousMin && records.length >= 10) {
                return -1;
            }

            return records.indexOf(newScore);
        }

        function getMaxSurvivalScore(username) {
            if (!username) return 0;
            const records = getSurvivalRecords(username);
            return records.length > 0 ? records[0] : 0;
        }

        // ----- Play-time helpers (per account) -----
        // Stored as a single integer (ms) under `${user}__playTime`
        // alongside the records so the Records screen can answer
        // "how much time have you been gaming on this account".
        function getPlayTime(username) {
            if (!username) return 0;
            const key = `${username}__playTime`;
            const all = getAllRecords();
            const v = all[key];
            return typeof v === 'number' && v > 0 ? v : 0;
        }

        function addPlayTimeToUser(username, ms) {
            if (!username || !ms || ms <= 0) return;
            const key = `${username}__playTime`;
            const all = getAllRecords();
            const prev = typeof all[key] === 'number' ? all[key] : 0;
            all[key] = prev + ms;
            saveAllRecords(all);
        }

        // Save any in-flight session time to the current user's bucket.
        // Called whenever we leave the PLAYING state, the game ends,
        // the player pauses, or they back out to the menu.
        function flushPlayTime() {
            if (currentUser && playingStartedAt > 0) {
                const elapsed = Date.now() - playingStartedAt;
                if (elapsed > 0) addPlayTimeToUser(currentUser, elapsed);
                playingStartedAt = 0;
            }
        }

        // Start (or restart) the play-time clock for the next run.
        function startPlayTimer() {
            playingStartedAt = Date.now();
        }

        // Render ms as a friendly "Xh Ym Zs". The records screen
        // uses this to answer "how much time did you play".
        function formatPlayTime(ms) {
            if (!ms || ms <= 0) return '0s';
            const totalSec = Math.floor(ms / 1000);
            const hours = Math.floor(totalSec / 3600);
            const minutes = Math.floor((totalSec % 3600) / 60);
            const seconds = totalSec % 60;
            if (hours > 0) return `${hours}h ${minutes}m ${seconds}s`;
            if (minutes > 0) return `${minutes}m ${seconds}s`;
            return `${seconds}s`;
        }

        function saveLastUser(username) {
            if (username) {
                localStorage.setItem('starCatcherLastUser', username);
            } else {
                localStorage.removeItem('starCatcherLastUser');
            }
        }

        function loadLastUser() {
            return localStorage.getItem('starCatcherLastUser') || null;
        }

        // Settings are stored per-account so each player keeps their own
        // audio preferences. A separate "default" key is used when no
        // account is active (before creating one, or after clearing it).
        function settingsStorageKey() {
            return currentUser
                ? `starCatcherSettings_${currentUser}`
                : 'starCatcherSettings__default';
        }

        function loadSettings() {
            try {
                const raw = localStorage.getItem(settingsStorageKey());
                if (raw) {
                    const parsed = JSON.parse(raw);
                    return {
                        music: typeof parsed.music === 'boolean' ? parsed.music : true,
                        sfx: typeof parsed.sfx === 'boolean' ? parsed.sfx : true
                    };
                }
            } catch (e) { /* fall through to defaults */ }
            return { music: true, sfx: true };
        }

        function saveSettings() {
            try {
                localStorage.setItem(settingsStorageKey(), JSON.stringify(settings));
            } catch (e) { /* silent fail on quota / disabled storage */ }
        }

        function showMobileInput(show) {
            const wrapper = document.getElementById('mobileAccountInput');
            if (!wrapper) return;
            if (show) {
                wrapper.style.display = 'block';
                const input = document.getElementById('accountMobileInput');
                if (input) {
                    input.value = accountInput || '';
                    // Focus con ritardo per mobile
                    setTimeout(() => input.focus(), 150);
                }
                mobileInputVisible = true;
            } else {
                wrapper.style.display = 'none';
                mobileInputVisible = false;
            }
        }

        /* ============================================================
           4. GAME LOGIC FUNCTIONS
        ============================================================ */
        function createStar() {
            return {
                x: Math.random() * canvas.width,
                y: -10,
                radius: 8 + Math.random() * 10,
                speed: 1 + Math.random() * 3,
                color: `hsl(${Math.random() * 60 + 30}, 100%, 60%)`
            };
        }

        function createMeteorite() {
            // Meteorites spawn at the top and descend. They rotate while
            // falling, have a fiery trail, and come in varying sizes — larger
            // ones move slower but are harder to dodge.
            const sizes = [
                { radius: 22, speed: 1.4 + Math.random() * 0.6 },
                { radius: 30, speed: 1.1 + Math.random() * 0.5 },
                { radius: 40, speed: 0.8 + Math.random() * 0.4 }
            ];
            const pick = sizes[Math.floor(Math.random() * sizes.length)];
            return {
                x: Math.random() * (canvas.width - 80) + 40,
                y: -50,
                radius: pick.radius,
                speed: pick.speed,
                rotation: Math.random() * Math.PI * 2,
                rotationSpeed: (Math.random() - 0.5) * 0.08,
                hue: 18 + Math.random() * 20      // reddish-orange rock palette
            };
        }

        function resetGame() {
            stars = [];
            meteorites = [];
            score = 0;
            lives = 3;
            gameOver = false;
            isNewRecord = false;
            newRecordPosition = -1;
            inGameRecordShown = false;
            inGameRecordShownAt = 0;
            meteoriteHitCooldown = 0;
            survivalStartTime = 0;
            survivalScorePerSecondTick = 0;
            player.x = 400;
            player.y = 550;
            player.targetX = 400;
            leftPressed = false;
            rightPressed = false;
            updateTouchVisibility();
        }

        function startGame(mode) {
            if (typeof mode === 'string') {
                gameMode = mode;
            }
            if (!currentUser) {
                showMobileInput(false);
                gameState = GAME_STATES.ACCOUNT;
                accountInput = '';
                return;
            }
            stopMenuMusic();
            menuMusicStarted = false; // Reset il flag della musica del menu
            resetGame();
            showMobileInput(false);
            gameState = GAME_STATES.PLAYING;
            startPlayTimer();          // begin timing this play session
            updateTouchVisibility();
        }

        function togglePause() {
            if (gameState === GAME_STATES.PLAYING && !gameOver) {
                flushPlayTime();       // stop the clock while paused
                gameState = GAME_STATES.PAUSED;
                isPaused = true;
                playClickSound();
                updateTouchVisibility();
            } else if (gameState === GAME_STATES.PAUSED) {
                startPlayTimer();      // resume the clock on unpause
                gameState = GAME_STATES.PLAYING;
                isPaused = false;
                playClickSound();
                updateTouchVisibility();
            }
        }

        function updatePauseButton() {
            const pauseButton = document.getElementById('pauseButton');
            if (!pauseButton) return;

            if (gameState === GAME_STATES.PLAYING || gameState === GAME_STATES.PAUSED) {
                pauseButton.style.display = 'flex';
                pauseButton.textContent = gameState === GAME_STATES.PAUSED ? '▶' : '⏸';
                pauseButton.setAttribute('aria-label', gameState === GAME_STATES.PAUSED ? 'Resume Game' : 'Pause Game');
            } else {
                pauseButton.style.display = 'none';
            }
        }

        function updateRocketEmoji() {
            if (gameState !== GAME_STATES.MENU) {
                if (rocketEmoji.isEscaping) {
                    rocketEmoji.isEscaping = false;
                    rocketEmoji.escapeTimer = 0;
                    rocketEmoji.vx = 0;
                    rocketEmoji.vy = 0;
                }
                return;
            }

            if (rocketEmoji.isEscaping) {
                rocketEmoji.x += rocketEmoji.vx;
                rocketEmoji.y += rocketEmoji.vy;
                rocketEmoji.angle = Math.atan2(rocketEmoji.vy, rocketEmoji.vx) + Math.PI / 2;

                const margin = 40;
                if (rocketEmoji.x < margin || rocketEmoji.x > canvas.width - margin) {
                    rocketEmoji.vx *= -1;
                    rocketEmoji.x = Math.max(margin, Math.min(canvas.width - margin, rocketEmoji.x));
                }
                if (rocketEmoji.y < margin || rocketEmoji.y > canvas.height - margin) {
                    rocketEmoji.vy *= -1;
                    rocketEmoji.y = Math.max(margin, Math.min(canvas.height - margin, rocketEmoji.y));
                }

                rocketEmoji.escapeTimer--;
                if (rocketEmoji.escapeTimer <= 0) {
                    rocketEmoji.isEscaping = false;
                    rocketEmoji.vx = 0;
                    rocketEmoji.vy = 0;
                    rocketEmoji.angle = 0;
                }
            }
        }

        /* ============================================================
           5. UPDATE GAME STATE
        ============================================================ */
        function update() {
            if (gameState !== GAME_STATES.PLAYING || gameOver) return;

            // Movimento con pulsanti premuti (priorità assoluta)
            if (touchLeft) {
                player.x -= MOVE_SPEED;
            } else if (touchRight) {
                player.x += MOVE_SPEED;
            } else if (leftPressed) {
                player.x -= MOVE_SPEED;
            } else if (rightPressed) {
                player.x += MOVE_SPEED;
            } else {
                // Altrimenti segue il mouse/touch drag
                player.x += (player.targetX - player.x) * 0.3;
            }

            if (player.x < player.radius) player.x = player.radius;
            if (player.x > canvas.width - player.radius) player.x = canvas.width - player.radius;

            if (gameMode === GAME_MODES.CLASSIC) {
                // Classic: stars fall; catching them gives points, missing
                // them costs a life.
                if (Math.random() < 0.05) {
                    stars.push(createStar());
                }

                for (let i = stars.length - 1; i >= 0; i--) {
                    const star = stars[i];
                    star.y += star.speed;

                    const dx = player.x - star.x;
                    const dy = player.y - star.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    const collisionDistance = player.radius + star.radius;

                    if (distance < collisionDistance) {
                        score++;
                        playCollectSound();
                        stars.splice(i, 1);
                        continue;
                    }

                    if (star.y > canvas.height + star.radius) {
                        lives--;
                        playLoseLifeSound();
                        stars.splice(i, 1);
                        if (lives <= 0) endGame();
                        continue;
                    }
                }

                if (stars.length > 100) {
                    stars.splice(0, stars.length - 100);
                }

                // In-game NEW RECORD banner (classic only)
                if (!inGameRecordShown && currentUser && score > 0
                    && getMaxScore(currentUser) > 0
                    && score >= getMaxScore(currentUser)) {
                    inGameRecordShown = true;
                    inGameRecordShownAt = Date.now();
                }
            } else {
                // Survival: meteorites fall; dodging them is the goal.
                // Hitting the ship costs a life. Score = seconds survived.
                updateSurvival();
            }
        }

        function updateSurvival() {
            // Score grows with time — convert real-time elapsed since the
            // run started into an integer-seconds counter via an accumulator.
            if (survivalStartTime === 0) {
                // Late-initialise so the timer starts the moment survival
                // begins. resetGame() also prepares this to 0.
                survivalStartTime = Date.now();
            }
            survivalScorePerSecondTick += (Date.now() - survivalStartTime) / 1000;
            const newSeconds = Math.floor(survivalScorePerSecondTick);
            survivalStartTime = Date.now();
            if (newSeconds > score) {
                score = newSeconds;
            }

            // Meteorite spawn cadence gradually ramps up the longer the
            // player survives, so the run keeps getting harder.
            const elapsedSec = score;
            const spawnChance = Math.min(0.025 + elapsedSec * 0.0008, 0.10);
            if (Math.random() < spawnChance) {
                meteorites.push(createMeteorite());
            }

            // Tick down i-frames after a hit so the player can take another
            // one once the brief invincibility window is over.
            if (meteoriteHitCooldown > 0) meteoriteHitCooldown--;

            for (let i = meteorites.length - 1; i >= 0; i--) {
                const m = meteorites[i];
                m.y += m.speed;
                m.rotation += m.rotationSpeed;

                // Player is briefly invincible after a hit so consecutive
                // meteorites in roughly the same column cannot drain all
                // three lives in an instant.
                if (meteoriteHitCooldown === 0) {
                    const dx = player.x - m.x;
                    const dy = player.y - m.y;
                    // Survival uses an almost-minimum capture radius so a
                    // glancing meteorite won't drain a life. The hit zone
                    // shrinks to a tiny core near the player's centre:
                    // meteorites must almost literally land on the ship to
                    // count. The mode is intentionally easy / enjoyable.
                    const hitDistance = player.radius * 0.15 + m.radius * 0.30;
                    const dist2 = dx * dx + dy * dy;
                    if (dist2 < hitDistance * hitDistance) {
                        lives--;
                        meteoriteHitCooldown = 60;  // ~1 second of i-frames at 60fps
                        playLoseLifeSound();
                        meteorites.splice(i, 1);
                        if (lives <= 0) endGame();
                        continue;
                    }
                }

                if (m.y > canvas.height + m.radius * 2) {
                    // Safely dodged — meteorites that leave the screen
                    // simply disappear. In survival we never punish a miss.
                    meteorites.splice(i, 1);
                }
            }

            // Safety cap so a long survival run can't accumulate thousands
            // of meteorites and tank the framerate. Tighter on mobile.
            const meteorCap = IS_MOBILE ? 25 : 40;
            if (meteorites.length > meteorCap) {
                meteorites.splice(0, meteorites.length - meteorCap);
            }
        }

        function endGame() {
            // Centralised game-over so both classic (star missed) and
            // survival (meteorite hit) paths honour the same record logic.
            flushPlayTime();   // persist this run's time to the account
            gameOver = true;
            playGameOverSound();
            if (currentUser) {
                if (gameMode === GAME_MODES.SURVIVAL) {
                    const pos = addSurvivalScoreToUser(currentUser, score);
                    if (pos !== -1) {
                        isNewRecord = true;
                        newRecordPosition = pos;
                        playRecordSound();
                    }
                } else {
                    const pos = addScoreToUser(currentUser, score);
                    if (pos !== -1) {
                        isNewRecord = true;
                        newRecordPosition = pos;
                        playRecordSound();
                    }
                }
            }
        }

        /* ============================================================
           6. DRAWING FUNCTIONS
        ============================================================ */
        function drawBackground() {
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.shadowBlur = 0;
            const twinkleCount = IS_MOBILE ? 50 : 100;
            for (let i = 0; i < twinkleCount; i++) {
                const x = (i * 137 + 50) % canvas.width;
                const y = (i * 251 + 30) % canvas.height;
                const size = 0.5 + (i % 3) * 0.5;
                const brightness = 0.6 + Math.random() * 0.4;
                ctx.fillStyle = `rgba(255, 255, 255, ${brightness})`;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }

            const g1 = ctx.createRadialGradient(120, 100, 10, 120, 100, 60);
            g1.addColorStop(0, '#ff8c42');
            g1.addColorStop(0.7, '#b84a1c');
            g1.addColorStop(1, '#4a1a0a');
            ctx.shadowColor = '#ff8c42';
            ctx.shadowBlur = 30;
            ctx.beginPath();
            ctx.arc(120, 100, 60, 0, Math.PI * 2);
            ctx.fillStyle = g1;
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.strokeStyle = 'rgba(255,200,100,0.3)';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.ellipse(120, 100, 90, 25, -0.2, 0, Math.PI * 2);
            ctx.stroke();

            const g2 = ctx.createRadialGradient(700, 500, 15, 700, 500, 45);
            g2.addColorStop(0, '#4fc3ff');
            g2.addColorStop(0.5, '#1a7ab5');
            g2.addColorStop(1, '#0a2a4a');
            ctx.shadowColor = '#4fc3ff';
            ctx.shadowBlur = 25;
            ctx.beginPath();
            ctx.arc(700, 500, 45, 0, Math.PI * 2);
            ctx.fillStyle = g2;
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.beginPath();
            ctx.ellipse(690, 490, 20, 10, 0.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(710, 510, 15, 8, -0.3, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawBlueCharacter(now) {
            const c = blueCharacter;
            const bobY = Math.sin(c.bobPhase) * 6;
            const cx = c.cx;
            const cy = c.cy + bobY;

            ctx.save();

            ctx.shadowColor = '#88c8ff';
            ctx.shadowBlur = 22;
            ctx.fillStyle = '#7ec8e3';
            ctx.beginPath();
            ctx.arc(cx, cy, c.bodyRadius, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            const grad = ctx.createRadialGradient(cx - 8, cy - 10, 4, cx, cy, c.bodyRadius);
            grad.addColorStop(0, 'rgba(255,255,255,0.55)');
            grad.addColorStop(0.6, 'rgba(255,255,255,0.05)');
            grad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(cx, cy, c.bodyRadius, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = '#3a8cff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(cx, cy, c.bodyRadius, 0, Math.PI * 2);
            ctx.stroke();

            ctx.strokeStyle = '#3a8cff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(cx, cy - c.bodyRadius);
            ctx.lineTo(cx, cy - c.bodyRadius - 14);
            ctx.stroke();
            ctx.fillStyle = '#ffd84a';
            ctx.shadowColor = '#ffd84a';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(cx, cy - c.bodyRadius - 16, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            ctx.fillStyle = 'rgba(255, 140, 160, 0.55)';
            ctx.beginPath();
            ctx.arc(cx - 14, cy + 6, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(cx + 14, cy + 6, 5, 0, Math.PI * 2);
            ctx.fill();

            const blink = (Math.floor(now / 3500) % 7 === 0);
            const povX = c.isHovering ? 2 : 0;
            const povY = c.isHovering ? -2 : 0;
            const eyeY = cy - 4;
            ctx.fillStyle = '#ffffff';
            ctx.beginPath(); ctx.arc(cx - 8, eyeY, 6, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(cx + 8, eyeY, 6, 0, Math.PI * 2); ctx.fill();
            if (!blink) {
                ctx.fillStyle = '#1a2a4a';
                ctx.beginPath(); ctx.arc(cx - 8 + povX, eyeY + povY, 3, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(cx + 8 + povX, eyeY + povY, 3, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#ffffff';
                ctx.beginPath(); ctx.arc(cx - 8 + povX + 1, eyeY + povY - 1, 1, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(cx + 8 + povX + 1, eyeY + povY - 1, 1, 0, Math.PI * 2); ctx.fill();
            } else {
                ctx.strokeStyle = '#1a2a4a';
                ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.moveTo(cx - 12, eyeY); ctx.lineTo(cx - 4, eyeY); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(cx + 4, eyeY); ctx.lineTo(cx + 12, eyeY); ctx.stroke();
            }

            ctx.strokeStyle = '#1a2a4a';
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.beginPath();
            const smileY = cy + 12;
            const smileR = c.isHovering ? c.bodyRadius * 0.7 : c.bodyRadius * 0.55;
            ctx.arc(cx, smileY - 2, smileR, 0.15 * Math.PI, 0.85 * Math.PI);
            ctx.stroke();
            ctx.lineCap = 'butt';

            ctx.font = 'bold 11px Orbitron, sans-serif';
            ctx.fillStyle = '#88c8ff';
            ctx.shadowColor = 'black';
            ctx.shadowBlur = 4;
            ctx.textAlign = 'center';
            ctx.fillText('BLUE', cx, cy + c.bodyRadius + 14);
            ctx.shadowBlur = 0;

            ctx.restore();
        }

        function drawSpeechBubble() {
            const a = blueCharacter.bubbleAlpha;
            if (a <= 0.01) return;

            const text = blueCharacter.currentLine;
            const fontSize = 13;
            ctx.font = fontSize + 'px Orbitron, sans-serif';
            const padding = 9;
            // Keep bubble well clear of RECORDS row (y >= 465).
            const maxWidth = 200;
            const words = text.split(' ');
            const lines = [];
            let cur = '';
            for (const w of words) {
                const candidate = cur ? cur + ' ' + w : w;
                const wWidth = ctx.measureText(candidate).width;
                if (wWidth > maxWidth && cur) {
                    lines.push(cur);
                    cur = w;
                } else {
                    cur = candidate;
                }
            }
            if (cur) lines.push(cur);

            const lineHeight = fontSize + 4;
            const boxW = Math.min(
                maxWidth + padding * 2,
                Math.max(...lines.map(l => ctx.measureText(l).width)) + padding * 2
            );
            const boxH = lineHeight * lines.length + padding * 2;

            // Speech bubble: positioned just above Blue and to the right.
            // With the tightened font (13px) and padding the bubble ends
            // around y=460 for 2-line messages, leaving only a thin
            // sliver of overlap with the top of the RECORDS row.
            const boxX = 165;
            const boxY = 415;
            // Tail anchors on the bubble's bottom edge (left side) and
            // its tip points down-left toward Blue's antenna.
            const tailBaseLeftX = boxX + 6;
            const tailBaseRightX = boxX + 46;
            const tailTipX = blueCharacter.cx + 8;
            const tailTipY = boxY + boxH + 18;

            ctx.save();
            ctx.globalAlpha = a;
            ctx.shadowColor = 'rgba(0, 0, 0, 0.65)';
            ctx.shadowBlur = 14;
            ctx.shadowOffsetY = 4;

            ctx.fillStyle = '#ffffff';
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.roundRect(boxX, boxY, boxW, boxH, 14);
            ctx.fill();
            ctx.stroke();

            // Tail: two top vertices sit exactly on the bubble's bottom
            // edge so the triangle visibly fuses with the bubble; the
            // bottom tip points at Blue.
            ctx.beginPath();
            ctx.moveTo(tailBaseLeftX, boxY + boxH);
            ctx.lineTo(tailTipX, tailTipY);
            ctx.lineTo(tailBaseRightX, boxY + boxH);
            ctx.closePath();
            ctx.fillStyle = '#ffffff';
            ctx.fill();
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.shadowBlur = 0;
            ctx.shadowOffsetY = 0;
            ctx.fillStyle = '#1a2a4a';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            for (let i = 0; i < lines.length; i++) {
                ctx.fillText(lines[i], boxX + boxW / 2, boxY + padding + i * lineHeight);
            }
            ctx.restore();
        }

        function drawMenu() {
            drawBackground();
            // Avvia la musica del menu solo una volta all'entrata
            if (!menuMusicStarted) {
                playMenuMusic();
                menuMusicStarted = true;
            }

            ctx.textAlign = 'center';
            ctx.shadowColor = '#4af';
            ctx.shadowBlur = 50;

            const centerX = canvas.width / 2;
            const titleY = 170;

            ctx.font = 'bold 72px Orbitron, sans-serif';
            const starText = 'STAR';
            const catcherText = 'CATCHER';
            const starWidth = ctx.measureText(starText).width;
            const catcherWidth = ctx.measureText(catcherText).width;
            const totalTextWidth = starWidth + catcherWidth + 20;

            if (!rocketEmoji.isEscaping && rocketEmoji.escapeTimer <= 0) {
                rocketEmoji.baseX = centerX - totalTextWidth / 2 - 40;
                rocketEmoji.x = rocketEmoji.baseX;
                rocketEmoji.y = rocketEmoji.baseY;
            }

            ctx.font = 'bold 72px Orbitron, sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.fillText(starText, centerX - catcherWidth / 2 - 10, titleY);
            ctx.fillStyle = '#ffd700';
            ctx.fillText(catcherText, centerX + starWidth / 2 + 10, titleY);

            ctx.save();
            ctx.translate(rocketEmoji.x, rocketEmoji.y);
            ctx.rotate(rocketEmoji.angle);
            ctx.font = '60px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = '#ff6b35';
            ctx.shadowBlur = 30;
            ctx.fillText('🚀', 0, 0);
            ctx.restore();

            ctx.shadowBlur = 10;
            ctx.shadowColor = 'black';
            ctx.font = '24px Orbitron, sans-serif';
            ctx.fillStyle = '#88aaff';
            ctx.fillText('Get the stars, beat the record!', canvas.width / 2, 310);

            ctx.font = '18px Orbitron, sans-serif';
            ctx.fillStyle = '#66dd88';
            ctx.shadowBlur = 10;
            ctx.fillText(
                currentUser ? `👤 ${currentUser}` : '👤 No account',
                canvas.width / 2,
                350
            );

            // Two rows of two buttons: PLAY/ACCOUNT top, RECORDS/SETTINGS bottom
            const btnY = 380;
            const btnW = 180;
            const btnH = 50;
            const gap = 25;
            const row2Y = btnY + btnH + 35;
            const row2H = 40;

            const playX = canvas.width / 2 - btnW - gap / 2;
            const playCenterX = playX + btnW / 2;
            ctx.shadowBlur = 30;
            ctx.shadowColor = '#4af';
            ctx.fillStyle = '#2a6aff';
            ctx.beginPath();
            ctx.roundRect(playX, btnY, btnW, btnH, 12);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'white';
            ctx.font = 'bold 24px Orbitron, sans-serif';
            ctx.fillText('▶ PLAY', playCenterX, btnY + 34);

            const accX = canvas.width / 2 + gap / 2;
            const accCenterX = accX + btnW / 2;
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#88aaff';
            ctx.fillStyle = '#3a3a6a';
            ctx.beginPath();
            ctx.roundRect(accX, btnY, btnW, btnH, 12);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#88aaff';
            ctx.font = 'bold 22px Orbitron, sans-serif';
            ctx.fillText('👤 ACCOUNT', accCenterX, btnY + 34);

            const recX = canvas.width / 2 - btnW - gap / 2;
            const recCenterX = recX + btnW / 2;
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ffd700';
            ctx.fillStyle = '#2a2a4a';
            ctx.beginPath();
            ctx.roundRect(recX, row2Y, btnW, row2H, 10);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#ffd700';
            ctx.font = '20px Orbitron, sans-serif';
            ctx.fillText('🏆 RECORDS', recCenterX, row2Y + 28);

            const settingsX = canvas.width / 2 + gap / 2;
            const settingsCenterX = settingsX + btnW / 2;
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#aaaaaa';
            ctx.fillStyle = '#2a2a3a';
            ctx.beginPath();
            ctx.roundRect(settingsX, row2Y, btnW, row2H, 10);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.strokeStyle = 'rgba(170, 170, 170, 0.4)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.roundRect(settingsX, row2Y, btnW, row2H, 10);
            ctx.stroke();
            ctx.fillStyle = '#cccccc';
            ctx.font = '20px Orbitron, sans-serif';
            ctx.fillText('⚙ SETTINGS', settingsCenterX, row2Y + 28);

            // ----- Blue mascot lives in the lower-left of the menu -----
            const now = Date.now();
            updateBlueCharacter(now);
            drawBlueCharacter(now);
            drawSpeechBubble();

            // Row 3 SURVIVAL: full-width red button with skull emoji,
            // entry point for the high-difficulty dodge mode.
            const survivalMenuY = row2Y + row2H + 25;
            const survivalMenuW = 200;
            const survivalMenuX = canvas.width / 2 - survivalMenuW / 2;
            ctx.shadowBlur = 35;
            ctx.shadowColor = '#ff0000';
            ctx.fillStyle = '#a01010';
            ctx.beginPath();
            ctx.roundRect(survivalMenuX, survivalMenuY, survivalMenuW, 40, 10);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.strokeStyle = 'rgba(255, 90, 90, 0.7)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.roundRect(survivalMenuX, survivalMenuY, survivalMenuW, 40, 10);
            ctx.stroke();
            ctx.fillStyle = '#ffcccc';
            ctx.font = 'bold 20px Orbitron, sans-serif';
            ctx.fillText('💀 SURVIVAL', canvas.width / 2, survivalMenuY + 27);

            menuButtons = [
                { rect: { x: playX, y: btnY, w: btnW, h: btnH }, action: 'play' },
                { rect: { x: accX, y: btnY, w: btnW, h: btnH }, action: 'account' },
                { rect: { x: recX, y: row2Y, w: btnW, h: row2H }, action: 'records' },

        function drawFallingStars() {
            for (const star of stars) {
                ctx.save();
                ctx.translate(star.x, star.y);
                ctx.shadowColor = star.color;
                ctx.shadowBlur = 20;
                ctx.fillStyle = star.color;
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;

                const spikes = 5;
                const outerRadius = star.radius;
                const innerRadius = star.radius * 0.4;
                ctx.beginPath();
                for (let i = 0; i < spikes * 2; i++) {
                    const radius = i % 2 === 0 ? outerRadius : innerRadius;
                    const angle = (i * Math.PI) / spikes - Math.PI / 2;
                    const x = radius * Math.cos(angle);
                    const y = radius * Math.sin(angle);
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                ctx.restore();
            }
        }

        function drawMeteorite(m) {
            // Fire trail: a soft comma-shaped flame painted underneath the
            // rock that gets fainter and smaller the further back it goes.
            ctx.save();
            ctx.translate(m.x, m.y);
            ctx.rotate(m.rotation);

            const trailLen = m.radius * 2.4;
            const trailGrad = ctx.createLinearGradient(0, m.radius * 0.6, 0, m.radius * 0.6 + trailLen);
            trailGrad.addColorStop(0, `hsla(${m.hue}, 95%, 65%, 0.85)`);
            trailGrad.addColorStop(0.4, `hsla(${m.hue + 10}, 95%, 55%, 0.45)`);
            trailGrad.addColorStop(1, `hsla(${m.hue + 20}, 95%, 45%, 0)`);
            ctx.fillStyle = trailGrad;
            ctx.beginPath();
            ctx.moveTo(-m.radius * 0.55, m.radius * 0.6);
            ctx.quadraticCurveTo(0, m.radius * 0.6 + trailLen * 0.55, m.radius * 0.55, m.radius * 0.6);
            ctx.lineTo(m.radius * 0.25, m.radius * 0.6 + trailLen);
            ctx.quadraticCurveTo(-m.radius * 0.4, m.radius * 0.6 + trailLen * 1.1, -m.radius * 0.25, m.radius * 0.6 + trailLen);
            ctx.closePath();
            ctx.fill();

            // Soft outer glow so the meteorite reads as burning.
            // Skip on mobile — shadowBlur is the most expensive per-meteorite
            // op and a phone can't sustain 25+ of them at 60fps.
            ctx.shadowColor = `hsl(${m.hue}, 95%, 60%)`;
            ctx.shadowBlur = IS_MOBILE ? 0 : 24;

            // Rocky body — irregular polygon with a fiery outer ring
            const sides = 7;
            const ringGrad = ctx.createRadialGradient(0, 0, m.radius * 0.4, 0, 0, m.radius);
            ringGrad.addColorStop(0, `hsl(${m.hue + 15}, 80%, 55%)`);
            ringGrad.addColorStop(0.7, `hsl(${m.hue}, 60%, 30%)`);
            ringGrad.addColorStop(1, '#1a0a05');
            ctx.fillStyle = ringGrad;
            ctx.beginPath();
            for (let i = 0; i < sides; i++) {
                const wobble = 0.82 + ((i * 41) % 17) / 100;   // pseudo-random radius wobble
                const angle = (i / sides) * Math.PI * 2;
                const px = Math.cos(angle) * m.radius * wobble;
                const py = Math.sin(angle) * m.radius * wobble;
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = `hsla(${m.hue + 10}, 95%, 70%, 0.8)`;
            ctx.lineWidth = 2;
            ctx.stroke();

            // A few bright crater highlights for texture
            ctx.shadowBlur = 0;
            ctx.fillStyle = `hsla(${m.hue + 20}, 100%, 75%, 0.6)`;
            ctx.beginPath();
            ctx.arc(-m.radius * 0.25, -m.radius * 0.15, m.radius * 0.18, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(m.radius * 0.3, m.radius * 0.18, m.radius * 0.12, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        function drawMeteorites() {
            for (const m of meteorites) {

        function drawSurvivalOverlay() {
            // Same background, with a red filter on top so it is obvious
            // the player is in survival mode. The vignette darkens the
            // edges a bit to feel more "dangerous".
            const bodyRed = ctx.createLinearGradient(0, 0, 0, canvas.height);
            bodyRed.addColorStop(0, 'rgba(180, 20, 20, 0.30)');
            bodyRed.addColorStop(0.5, 'rgba(200, 30, 30, 0.28)');
            bodyRed.addColorStop(1, 'rgba(140, 10, 10, 0.34)');
            ctx.fillStyle = bodyRed;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const vignette = ctx.createRadialGradient(
                canvas.width / 2, canvas.height / 2, canvas.height * 0.35,
                canvas.width / 2, canvas.height / 2, canvas.height * 0.9
            );
            vignette.addColorStop(0, 'rgba(255, 80, 80, 0)');
            vignette.addColorStop(1, 'rgba(120, 0, 0, 0.45)');
            ctx.fillStyle = vignette;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Subtle red scanline flicker, much weaker than the body tint.
            // Use a wider row stride on mobile so the loop cuts in half.
            ctx.fillStyle = 'rgba(255, 60, 60, 0.05)';
            const scanStride = IS_MOBILE ? 8 : 4;
            for (let y = 0; y < canvas.height; y += scanStride) {
                ctx.fillRect(0, y, canvas.width, 2);
            }
        }

                let label = '';
                const pos = newRecordPosition;

                    // Survival uses a red-ish badge to stay on-brand with
                    // the mode's colour scheme.
                    if (pos === 0) {
                        label = '☠ BEST SURVIVAL TIME ☠';
                    } else if (pos === 1) {
                        label = '☠ NEW SURVIVAL RECORD! (2nd)';
                    } else if (pos === 2) {

                    label = '🥈 NEW RECORD! (2nd place)';

                    label = `🎯 NEW RECORD! (${pos + 1}th place)`;

                ctx.shadowColor = isSurvival ? '#ff6b6b' : '#ffd700';

        function drawSettingsRow(x, y, w, h, title, description, value, action) {
            // Label (left)

            // Description (left, smaller)

            ctx.shadowBlur = 3;

            const pillW = 96;
            const pillH = 44;

            ctx.arc(value ? pillX + pillW - 22 : pillX + 22, pillY + pillH / 2, 13, 0, Math.PI * 2);

            menuButtons.push({
                rect: { x: pillX, y: pillY, w: pillW, h: pillH },

            // Title

            ctx.shadowBlur = 30;
