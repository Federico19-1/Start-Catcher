        function draw() {
            switch (gameState) {
                case GAME_STATES.MENU:
                    drawMenu();
                    break;
                case GAME_STATES.ACCOUNT:
                    drawAccountScreen();
                    break;
                case GAME_STATES.SETTINGS:
                    drawSettingsScreen();
                    break;
                case GAME_STATES.RECORDS:
                    drawRecordsScreen();
                    break;
                case GAME_STATES.PLAYING:
                    drawBackground();
                    if (gameMode === GAME_MODES.SURVIVAL) {
                        drawMeteorites();
                        drawSurvivalOverlay();   // red filter on top of bg+rocks+ship
                    } else {
                        drawFallingStars();
                    }
                    drawShip();
                    drawGameUI();
                    if (gameOver) drawGameOver();
                    break;
                case GAME_STATES.PAUSED:
                    drawBackground();
                    if (gameMode === GAME_MODES.SURVIVAL) {
                        drawMeteorites();
                        drawSurvivalOverlay();
                    } else {
                        drawFallingStars();
                    }
                    drawShip();
                    drawGameUI();
                    drawPauseScreen();
                    break;
            }
        }

        /* ============================================================
           7. HANDLE MENU ACTIONS
        ============================================================ */
        function handleMenuAction(action) {
            switch (action) {
                case 'play':
                    if (!currentUser) {
                        gameState = GAME_STATES.ACCOUNT;
                        accountInput = '';
                        showMobileInput(true);
                    } else {
                        startGame(GAME_MODES.CLASSIC);
                    }
                    break;
                case 'survival':
                    if (!currentUser) {
                        gameState = GAME_STATES.ACCOUNT;
                        accountInput = '';
                        showMobileInput(true);
                    } else {
                        startGame(GAME_MODES.SURVIVAL);
                    }
                    break;
                case 'account':
                    gameState = GAME_STATES.ACCOUNT;
                    accountInput = currentUser || '';
                    menuMusicStarted = false; // Reset per permettere di rientrare nel menu
                    showMobileInput(true);
                    break;
                case 'records':
                    if (!currentUser) {
                        gameState = GAME_STATES.ACCOUNT;
                        accountInput = '';
                        showMobileInput(true);
                    } else {
                        flushPlayTime();      // ensure displayed time is current
                        gameState = GAME_STATES.RECORDS;
                    }
                    break;
                case 'confirm':
                    if (accountInput.trim().length > 0) {
                        const newUser = accountInput.trim();
                        if (newUser.length > 12) {
                            alert('The name must be at most 12 characters!');
                            return;
                        }
                        // Se è un nuovo nome diverso da currentUser, azzera i record
                        if (newUser !== currentUser && currentUser) {
                            if (confirm(`Changing account from "${currentUser}" to "${newUser}".\nYour previous records will be reset. Continue?`)) {
                                // Rimuovi i record del vecchio account
                                const allRecords = getAllRecords();
                                delete allRecords[currentUser];
                                delete allRecords[currentUser + '__survival'];
                                saveAllRecords(allRecords);
                                currentUser = newUser;
                                getUserRecords(currentUser);
                                saveLastUser(currentUser);
                                settings = loadSettings();
                                resetGame();
                                gameState = GAME_STATES.MENU;
                                accountInput = newUser; // Mantieni il nuovo nome
                                showMobileInput(false);
                            }
                            // Se l'utente annulla, rimane nella schermata account
                        } else {
                            currentUser = newUser;
                            getUserRecords(currentUser);
                            saveLastUser(currentUser);
                            settings = loadSettings();
                            resetGame();
                            gameState = GAME_STATES.MENU;
                            accountInput = newUser; // Mantieni il nome
                            showMobileInput(false);
                        }
                    } else {
                        alert('Please enter a name!');
                    }
                    break;
                case 'cancel':
                    gameState = GAME_STATES.MENU;
                    accountInput = '';
                    showMobileInput(false);
                    break;
                case 'back':
                    gameState = GAME_STATES.MENU;
                    showMobileInput(false);
                    break;
                case 'playAgain':
                    stopMenuMusic();
                    flushPlayTime();
                    resetGame();
                    gameState = GAME_STATES.PLAYING;
                    startPlayTimer();
                    updateTouchVisibility();
                    break;
                case 'menu':
                    flushPlayTime();
                    resetGame();
                    gameState = GAME_STATES.MENU;
                    menuMusicStarted = false; // Reset per permettere di riavviare la musica
                    playMenuMusic();
                    updateTouchVisibility();
                    break;
                case 'pauseMenu':
                    flushPlayTime();
                    stopMenuMusic();
                    resetGame();
                    gameState = GAME_STATES.MENU;
                    menuMusicStarted = false;
                    playMenuMusic();
                    updateTouchVisibility();
                    break;
                case 'settings':
                    gameState = GAME_STATES.SETTINGS;
                    showMobileInput(false);
                    break;
                case 'toggleMusic':
                    settings.music = !settings.music;
                    saveSettings();
                    playMenuMusic(); // respects new settings.music value
                    playClickSound();
                    break;
                case 'toggleSfx':
                    settings.sfx = !settings.sfx;
                    saveSettings();
                    playClickSound();
                    break;
                case 'settingsBack':
                    gameState = GAME_STATES.MENU;
                    showMobileInput(false);
                    break;
                default:
                    break;
            }
            menuButtons = [];
        }

        /* ============================================================
           8. INPUT: MOUSE, KEYBOARD AND TOUCH
        ============================================================ */
        canvas.addEventListener('click', (event) => {
            const c = getGameCoords(event);
            for (const btn of menuButtons) {
                const r = btn.rect;
                if (c.x >= r.x && c.x <= r.x + r.w && c.y >= r.y && c.y <= r.y + r.h) {
                    handleMenuAction(btn.action);
                    break;
                }
            }
        });

        canvas.addEventListener('mousemove', (event) => {
            const c = getGameCoords(event);
            const wasHovering = blueCharacter.isHovering;
            if (gameState === GAME_STATES.MENU) {
                if (!rocketEmoji.isEscaping) {
                    const dx = c.x - rocketEmoji.x;
                    const dy = c.y - rocketEmoji.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 50) {
                        rocketEmoji.isEscaping = true;
                        rocketEmoji.escapeTimer = 1200; // 20 secondi a 60 FPS
                        const speed = 5 + Math.random() * 4;
                        const angle = Math.random() * Math.PI * 2;
                        rocketEmoji.vx = Math.cos(angle) * speed;
                        rocketEmoji.vy = Math.sin(angle) * speed;
                    }
                }
                const hoverNow = blueHoverHitTest(c.x, c.y);
                blueCharacter.isHovering = hoverNow;
                if (hoverNow && !wasHovering) {
                    pickNewBlueLine();
                }
            } else {
                blueCharacter.isHovering = false;
            }

            if (gameState === GAME_STATES.PLAYING) {
                player.targetX = c.x;
            }
        });

        window.addEventListener('keydown', (event) => {
            if (gameState === GAME_STATES.PLAYING) {
                if (event.key === 'ArrowLeft') {
                    leftPressed = true;
                    event.preventDefault();
                }
                if (event.key === 'ArrowRight') {
                    rightPressed = true;
                    event.preventDefault();
                }
                if (event.key === 'r' || event.key === 'R') {
                    if (gameOver) {
                        resetGame();
                        gameState = GAME_STATES.PLAYING;
                    }
                }
            }

            if (event.key === 'p' || event.key === 'P') {
                if (gameState === GAME_STATES.PLAYING || gameState === GAME_STATES.PAUSED) {
                    togglePause();
                    event.preventDefault();
                }
            }

            if (gameState === GAME_STATES.ACCOUNT) {
                const inputField = document.getElementById('accountMobileInput');
                if (event.key === 'Backspace') {
                    accountInput = accountInput.slice(0, -1);
                    if (inputField) inputField.value = accountInput;
                    event.preventDefault();
                } else if (event.key.length === 1 && accountInput.length < 12) {
                    if (/^[a-zA-Z0-9_]$/.test(event.key)) {
                        accountInput += event.key;
                        if (inputField) inputField.value = accountInput;
                        event.preventDefault();
                    }
                }
            }
        });

        window.addEventListener('keyup', (event) => {
            if (event.key === 'ArrowLeft') {
                leftPressed = false;
                event.preventDefault();
            }
            if (event.key === 'ArrowRight') {
                rightPressed = false;
                event.preventDefault();
            }
        });

        // Touch drag on canvas — drives the ship during gameplay AND
        // the Blue mascot on the menu (since mousemove never fires on
        // touch devices).
        let canvasTouchActive = false;
        canvas.addEventListener('touchstart', (event) => {
            const c = getGameCoords(event);
            if (gameState === GAME_STATES.PLAYING) {
                canvasTouchActive = true;
                player.targetX = c.x;
            } else if (gameState === GAME_STATES.MENU && IS_MOBILE) {
                // Tap Blue to make him speak. The hover state is held
                // for ~1.5s via a timestamp so there is time to read the
                // bubble before it fades back out. preventDefault keeps
                // the touch from bubbling into a synthetic click ~300 ms
                // later that could double-hit a button under the bubble.
                if (blueHoverHitTest(c.x, c.y)) {
                    blueCharacter.isHovering = true;
                    blueCharacter.hoverResetAt = Date.now() + 1500;
                    pickNewBlueLine();
                    event.preventDefault();
                }
            }
        }, { passive: true });
        canvas.addEventListener('touchmove', (event) => {
            if (gameState === GAME_STATES.PLAYING && canvasTouchActive) {
                const c = getGameCoords(event);
                player.targetX = c.x;
            }
        }, { passive: true });
        canvas.addEventListener('touchend', (event) => {
            if (gameState === GAME_STATES.PLAYING) {
                canvasTouchActive = false;
            }
        }, { passive: true });

        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');
        const pauseButton = document.getElementById('pauseButton');

        if (btnLeft) {
            btnLeft.addEventListener('mousedown', (e) => {
                e.preventDefault();
                touchLeft = true;
                btnLeft.style.transform = 'scale(0.95)';
                btnLeft.style.background = 'rgba(74, 170, 255, 0.5)';
            });
            btnLeft.addEventListener('mouseup', (e) => {
                e.preventDefault();
                touchLeft = false;
                btnLeft.style.transform = '';
                btnLeft.style.background = '';
            });
            btnLeft.addEventListener('mouseleave', (e) => {
                touchLeft = false;
                btnLeft.style.transform = '';
                btnLeft.style.background = '';
            });
            btnLeft.addEventListener('touchstart', (e) => {
                e.preventDefault();
                touchLeft = true;
                btnLeft.style.transform = 'scale(0.95)';
                btnLeft.style.background = 'rgba(74, 170, 255, 0.5)';
            });
            btnLeft.addEventListener('touchend', (e) => {
                e.preventDefault();
                touchLeft = false;
                btnLeft.style.transform = '';
                btnLeft.style.background = '';
            });
            btnLeft.addEventListener('touchcancel', (e) => {
                touchLeft = false;
                btnLeft.style.transform = '';
                btnLeft.style.background = '';
            });
        }

        if (btnRight) {
            btnRight.addEventListener('mousedown', (e) => {
                e.preventDefault();
                touchRight = true;
                btnRight.style.transform = 'scale(0.95)';
                btnRight.style.background = 'rgba(74, 170, 255, 0.5)';
            });
            btnRight.addEventListener('mouseup', (e) => {
                e.preventDefault();
                touchRight = false;
                btnRight.style.transform = '';
                btnRight.style.background = '';
            });
            btnRight.addEventListener('mouseleave', (e) => {
                touchRight = false;
                btnRight.style.transform = '';
                btnRight.style.background = '';
            });
            btnRight.addEventListener('touchstart', (e) => {
                e.preventDefault();
                touchRight = true;
                btnRight.style.transform = 'scale(0.95)';
                btnRight.style.background = 'rgba(74, 170, 255, 0.5)';
            });
            btnRight.addEventListener('touchend', (e) => {
                e.preventDefault();
                touchRight = false;
                btnRight.style.transform = '';
                btnRight.style.background = '';
            });
            btnRight.addEventListener('touchcancel', (e) => {
                touchRight = false;
                btnRight.style.transform = '';
                btnRight.style.background = '';
            });
        }

        if (pauseButton) {
            const handlePausePress = (e) => {
                e.preventDefault();
                if (gameState === GAME_STATES.PLAYING || gameState === GAME_STATES.PAUSED) {
                    togglePause();
                }
            };

            pauseButton.addEventListener('pointerup', handlePausePress);
        }

        const mobileConfirmBtn = document.getElementById('mobileConfirmBtn');
        const mobileCancelBtn = document.getElementById('mobileCancelBtn');
        const accountMobileInput = document.getElementById('accountMobileInput');

        if (mobileConfirmBtn) {
            mobileConfirmBtn.addEventListener('click', () => {
                const input = document.getElementById('accountMobileInput');
                const name = input.value.trim();
                console.log('Confirm clicked, name:', name);
                if (name.length > 0 && name.length <= 12) {
                    accountInput = name;
                    handleMenuAction('confirm');
                } else {
                    alert('Please enter a valid name (1-12 characters).');
                    input.focus();
                }
            });
        }

        if (mobileCancelBtn) {
            mobileCancelBtn.addEventListener('click', () => {
                console.log('Cancel clicked');
                handleMenuAction('cancel');
            });
        }

        // Gestore per cancellare il nome corrente
        const mobileClearNameBtn = document.getElementById('mobileClearNameBtn');
        if (mobileClearNameBtn) {
            mobileClearNameBtn.addEventListener('click', () => {
                accountInput = '';
                const input = document.getElementById('accountMobileInput');
                if (input) input.value = '';
                input.focus();
            });
        }

        // Gestore per cancellare l'account
        const mobileClearAccountBtn = document.getElementById('mobileClearAccountBtn');
        if (mobileClearAccountBtn) {
            mobileClearAccountBtn.addEventListener('click', () => {
                if (confirm('Are you sure you want to delete your account?\nThis will remove all your records permanently.')) {
                    // Rimuovi tutti i record dell'account
                    const allRecords = getAllRecords();
                    delete allRecords[currentUser];
                    delete allRecords[currentUser + '__survival'];
                    saveAllRecords(allRecords);

                    // Rimuovi l'ultimo utente salvato
                    localStorage.removeItem('starCatcherLastUser');

                    currentUser = null;
                    accountInput = '';
                    settings = loadSettings();
                    gameState = GAME_STATES.ACCOUNT;
                    showMobileInput(true);
                    const input = document.getElementById('accountMobileInput');
                    if (input) input.value = '';
                }
            });
        }

        // Focus automatico sull'input quando l'utente lo tocca
        const accountInputField = document.getElementById('accountMobileInput');
        if (accountInputField) {
            // Imposta il valore corrente all'avvio
            accountInputField.value = accountInput || '';

            accountInputField.addEventListener('touchstart', () => {
                accountInputField.focus();
                // Non reimpostare il valore qui! Altrimenti cancella ciò che l'utente sta scrivendo
            });
            accountInputField.addEventListener('input', () => {
                accountInput = accountInputField.value.slice(0, 12);
                if (accountInputField.value !== accountInput) {
                    accountInputField.value = accountInput;
                }
            });
        }

        if (accountMobileInput) {
            accountMobileInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    document.getElementById('mobileConfirmBtn').click();
                }
                if (e.key === 'Escape') {
                    document.getElementById('mobileCancelBtn').click();
                }
            });
        }

        /* ============================================================
           9. POLYFILL AND UTILITIES
        ============================================================ */
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
                if (r > w / 2) r = w / 2;
                if (r > h / 2) r = h / 2;
                this.moveTo(x + r, y);
                this.lineTo(x + w - r, y);
                this.quadraticCurveTo(x + w, y, x + w, y + r);
                this.lineTo(x + w, y + h - r);
                this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                this.lineTo(x + r, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - r);
                this.lineTo(x, y + r);
                this.quadraticCurveTo(x, y, x + r, y);
                return this;
            };
        }

        function updateTouchVisibility() {
            const controls = document.getElementById('touchControls');
            if (!controls) return;
            if (gameState === GAME_STATES.PLAYING && !gameOver) {
                controls.style.display = 'flex';
            } else {
                controls.style.display = 'none';
            }
            updatePauseButton();
        }

        /* ============================================================
           10. GAME LOOP AND INITIALIZATION
        ============================================================ */
        function gameLoop() {
            update();
            updateRocketEmoji();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Inizializza l'audio alla prima interazione dell'utente (richiesto da Web API)
        function initAudioOnUserInteraction() {
            initAudio();
            initMenuAudio();
            loadStarSound();
            // Rimuovi gli event listener dopo l'inizializzazione
            document.removeEventListener('click', initAudioOnUserInteraction);
            document.removeEventListener('keydown', initAudioOnUserInteraction);
            document.removeEventListener('touchstart', initAudioOnUserInteraction);

            // Avvia la musica del menù dopo 1 secondo se siamo sul menù
            setTimeout(() => {
                if (gameState === GAME_STATES.MENU && !menuMusicStarted) {
                    playMenuMusic();
                }
            }, 1000);
        }

        document.addEventListener('click', initAudioOnUserInteraction);
        document.addEventListener('keydown', initAudioOnUserInteraction);
        document.addEventListener('touchstart', initAudioOnUserInteraction);

        // Avvia la musica del menù dopo 1 seconde anche senza interazione se siamo sul menù
        setTimeout(() => {
            if (gameState === GAME_STATES.MENU && !menuMusicStarted) {
                playMenuMusic();
            }
        }, 1000);

        const savedUser = loadLastUser();
        if (savedUser) {
            currentUser = savedUser;
            getUserRecords(currentUser);
        }
        settings = loadSettings();

        resetGame();
        gameLoop();
    </script>
</body>

</html>
