<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Star Catcher - Gioco Spaziale</title>
    <!-- Google Font per il titolo spaziale -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
           0. STILE PAGINA
        ============================================================ */
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0a0a1a;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        canvas {
            border: 2px solid #4a4a8a;
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(74, 74, 138, 0.5);
            cursor: pointer;
        }
    </style>
    /* Pulsanti touch - visibili solo su mobile */
    @media (max-width: 768px) {
    #touchControls {
    display: flex !important;
    }
    canvas {
    cursor: default !important;
    }
    }
</head>

<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <!-- Input per account mobile -->
    <div id="mobileAccountInput"
        style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 30; background: #0a0a1a; padding: 25px; border-radius: 15px; border: 2px solid #4a8cff; box-shadow: 0 0 40px rgba(74, 140, 255, 0.5); width: 320px; text-align: center;">
        <div style="color: white; font-family: 'Orbitron', sans-serif; font-size: 22px; margin-bottom: 20px;">👤 CREA
            ACCOUNT</div>
        <input type="text" id="accountMobileInput" maxlength="12" placeholder="Nome (max 12 char)"
            style="width: 100%; background: #1a1a3a; color: white; border: 2px solid #4a8cff; border-radius: 8px; padding: 12px; font-family: 'Orbitron', sans-serif; font-size: 20px; text-align: center; box-sizing: border-box; outline: none;">
        <div style="margin-top: 20px; display: flex; justify-content: center; gap: 15px;">
            <button id="mobileConfirmBtn"
                style="background: #2a6aff; color: white; border: none; border-radius: 10px; padding: 12px 35px; font-family: 'Orbitron', sans-serif; font-size: 18px; cursor: pointer;">✅
                CONFERMA</button>
            <button id="mobileCancelBtn"
                style="background: #3a3a5a; color: #aaa; border: none; border-radius: 10px; padding: 12px 35px; font-family: 'Orbitron', sans-serif; font-size: 18px; cursor: pointer;">✖
                ANNULLA</button>
        </div>
    </div>

    <!-- PULSANTI TOUCH PER MOBILE -->
    <div id="touchControls"
        style="position: absolute; bottom: 20px; left: 0; right: 0; display: none; justify-content: space-between; padding: 0 20px; pointer-events: none; z-index: 10;">
        <button id="btnLeft"
            style="pointer-events: auto; width: 80px; height: 80px; border-radius: 50%; border: 3px solid rgba(74, 170, 255, 0.6); background: rgba(74, 170, 255, 0.2); color: rgba(74, 170, 255, 0.8); font-size: 40px; font-family: 'Orbitron', sans-serif; backdrop-filter: blur(5px); cursor: pointer; user-select: none; touch-action: manipulation;">◀</button>
        <button id="btnRight"
            style="pointer-events: auto; width: 80px; height: 80px; border-radius: 50%; border: 3px solid rgba(74, 170, 255, 0.6); background: rgba(74, 170, 255, 0.2); color: rgba(74, 170, 255, 0.8); font-size: 40px; font-family: 'Orbitron', sans-serif; backdrop-filter: blur(5px); cursor: pointer; user-select: none; touch-action: manipulation;">▶</button>
    </div>


    <script>
        /*============================================================
           1. SETUP CANVAS E CONTESTO
        ============================================================ */

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ============================================================
        //  2. STATO DEL GIOCO E VARIABILI GLOBALI
        // ============================================================

        // --- STATI DEL GIOCO ---
        const GAME_STATES = {
            MENU: 'menu', // Menu iniziale
            ACCOUNT: 'account', // Schermata account
            PLAYING: 'playing', // Gioco in corso
            PAUSED: 'paused' // Gioco in pausa
        };

        let gameState = GAME_STATES.MENU;
        let currentUser = null; // Nome dell'account attivo
        let accountInput = ''; // Testo digitato per nuovo account
        let isPaused = false;
        // --- PER I PULSANTI TOUCH ---
        let touchLeft = false;
        let touchRight = false;
        let mobileInputVisible = false;

        // --- GIOCATORE ---
        const player = {
            x: 400,
            y: 550,
            radius: 80,
            targetX: 400
        };

        // --- STELLE E PUNTEGGIO ---
        let stars = [];
        let score = 0;
        let lives = 3;
        let gameOver = false;
        let leftPressed = false;
        let rightPressed = false;
        let isNewRecord = false;
        let newRecordPosition = -1; // Posizione nella classifica (0=primo)
        const MOVE_SPEED = 5;

        // --- PER IL MENU (click detection) ---
        let menuButtons = [];

        // ============================================================
        //  2b. SISTEMA AUDIO (Web Audio API)
        // ============================================================

        // Crea il contesto audio (si attiva al primo click)
        let audioCtx = null;

        // Funzione per inizializzare l'audio (chiamata al primo click)
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // --- Suono: RACCOLTA STELLA ---
        function playCollectSound() {
            try {
                initAudio();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // La nota LA5
                oscillator.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);

                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);

                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.15);
            } catch (e) { /* Silenzioso se fallisce */ }
        }

        // --- Suono: PERDITA VITA ---
        function playLoseLifeSound() {
            try {
                initAudio();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(300, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.3);

                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);

                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.3);
            } catch (e) { /* Silenzioso se fallisce */ }
        }

        // --- Suono: GAME OVER ---
        function playGameOverSound() {
            try {
                initAudio();
                // Suono discendente cupo
                const notes = [440, 400, 350, 300, 250];
                for (let i = 0; i < notes.length; i++) {
                    const oscillator = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();

                    oscillator.connect(gainNode);
                    gainNode.connect(audioCtx.destination);

                    oscillator.type = 'sawtooth';
                    oscillator.frequency.setValueAtTime(notes[i], audioCtx.currentTime + i * 0.12);

                    gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime + i * 0.12);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.12 + 0.12);

                    oscillator.start(audioCtx.currentTime + i * 0.12);
                    oscillator.stop(audioCtx.currentTime + i * 0.12 + 0.12);
                }
            } catch (e) { /* Silenzioso se fallisce */ }
        }

        // --- Suono: NUOVO RECORD (fanfara) ---
        function playRecordSound() {
            try {
                initAudio();
                const notes = [523, 659, 784, 1047]; // Do, Mi, Sol, Do
                for (let i = 0; i < notes.length; i++) {
                    const oscillator = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();

                    oscillator.connect(gainNode);
                    gainNode.connect(audioCtx.destination);

                    oscillator.type = 'square';
                    oscillator.frequency.setValueAtTime(notes[i], audioCtx.currentTime + i * 0.15);

                    gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime + i * 0.15);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.15 + 0.2);

                    oscillator.start(audioCtx.currentTime + i * 0.15);
                    oscillator.stop(audioCtx.currentTime + i * 0.15 + 0.2);
                }
            } catch (e) { /* Silenzioso se fallisce */ }
        }

        // --- Suono: CLICK PULSANTE ---
        function playClickSound() {
            try {
                initAudio();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.frequency.setValueAtTime(600, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.05);

                gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);

                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.08);
            } catch (e) { /* Silenzioso se fallisce */ }
        }

        // ============================================================
        //  3. GESTIONE RECORD PER ACCOUNT (localStorage)
        // ============================================================

        // --- Ottiene tutti i record di tutti gli account ---
        function getAllRecords() {
            const data = localStorage.getItem('starCatcherAllRecords');
            return data ? JSON.parse(data) : {};
        }

        // --- Salva tutti i record ---
        function saveAllRecords(records) {
            localStorage.setItem('starCatcherAllRecords', JSON.stringify(records));
        }

        // --- Ottiene i record di un account specifico (array di 10 punteggi) ---
        function getUserRecords(username) {
            const all = getAllRecords();
            if (!all[username]) {
                // Inizializza con 10 zeri
                all[username] = Array(10).fill(0);
                saveAllRecords(all);
            }
            return all[username];
        }

        // --- Salva i record di un account specifico ---
        function setUserRecords(username, records) {
            const all = getAllRecords();
            all[username] = records;
            saveAllRecords(all);
        }

        // --- Aggiunge un punteggio alla classifica dell'account ---
        function addScoreToUser(username, newScore) {
            let records = getUserRecords(username);
            records.push(newScore);
            records.sort((a, b) => b - a);
            records = records.slice(0, 10);
            setUserRecords(username, records);
            // Trova la posizione del nuovo punteggio
            const position = records.indexOf(newScore);
            return position; // 0 = primo, 1 = secondo, ecc.
        }

        // --- Ottiene il record massimo di un account ---
        function getMaxScore(username) {
            if (!username) return 0;
            const records = getUserRecords(username);
            return records.length > 0 ? records[0] : 0;
        }

        // --- Salva l'ultimo account usato ---
        function saveLastUser(username) {
            if (username) {
                localStorage.setItem('starCatcherLastUser', username);
            } else {
                localStorage.removeItem('starCatcherLastUser');
            }
        }

        // --- Carica l'ultimo account usato ---
        function loadLastUser() {
            return localStorage.getItem('starCatcherLastUser') || null;
        }

        // ============================================================
        //  4. FUNZIONI DI GIOCO
        // ============================================================

        // --- 4a. Crea una stella ---
        function createStar() {
            return {
                x: Math.random() * canvas.width,
                y: -10,
                radius: 8 + Math.random() * 10,
                speed: 1 + Math.random() * 3,
                color: `hsl(${Math.random() * 60 + 30}, 100%, 60%)`
            };
        }

        // --- 4b. Resetta il gioco ---
        function resetGame() {
            stars = [];
            score = 0;
            lives = 3;
            gameOver = false;
            isNewRecord = false;
            newRecordPosition = -1;
            player.x = 400;
            player.y = 550;
            player.targetX = 400;
            leftPressed = false;
            rightPressed = false;
            updateTouchVisibility();
        }

        // --- 4c. Avvia il gioco dal menu ---
        function startGame() {
            if (!currentUser) {
                showMobileInput(false);
                // Se non c'è account, vai alla schermata account
                gameState = GAME_STATES.ACCOUNT;
                accountInput = '';
                return;
            }
            resetGame();
            showMobileInput(false);
            gameState = GAME_STATES.PLAYING;
            updateTouchVisibility();
        }

        // --- 4e. Gestione pausa ---
        function togglePause() {
            if (gameState === GAME_STATES.PLAYING && !gameOver) {
                gameState = GAME_STATES.PAUSED;
                isPaused = true;
                playClickSound(); // Suono di pausa
                updateTouchVisibility();
            } else if (gameState === GAME_STATES.PAUSED) {
                gameState = GAME_STATES.PLAYING;
                isPaused = false;
                playClickSound(); // Suono di ripresa 
                updateTouchVisibility();
            }
        }

        // --- 4d. Aggiorna la logica del gioco ---
        function update() {
            if (gameState !== GAME_STATES.PLAYING || gameOver) return;
            // --- MOVIMENTO ASTRONAVE (NUOVO SISTEMA) ---

            // 1. Mouse: aggiorna targetX (sempre)
            player.x += (player.targetX - player.x) * 0.3;

            // 2. Tasti freccia / pulsanti touch: si sommano al movimento
            //    ma NON sovrascrivono completamente il targetX
            const MOVE_SPEED = 5;

            if (leftPressed || touchLeft) {
                player.x -= MOVE_SPEED;
            }
            if (rightPressed || touchRight) {
                player.x += MOVE_SPEED;
            }

            // 3. Limiti astronave
            if (player.x < player.radius) player.x = player.radius;
            if (player.x > canvas.width - player.radius) player.x = canvas.width - player.radius;

            // Creazione nuove stelle
            if (Math.random() < 0.05) {
                stars.push(createStar());
            }

            // Aggiornamento stelle
            for (let i = stars.length - 1; i >= 0; i--) {
                const star = stars[i];
                star.y += star.speed;

                // Collisione con astronave
                const dx = player.x - star.x;
                const dy = player.y - star.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                const collisionDistance = player.radius + star.radius;

                if (distance < collisionDistance) {
                    score++;
                    playCollectSound();
                    stars.splice(i, 1);
                    continue;
                }

                // Stella uscita in basso
                if (star.y > canvas.height + star.radius) {
                    lives--;
                    playLoseLifeSound();
                    stars.splice(i, 1);
                    if (lives <= 0) {
                        gameOver = true;
                        playGameOverSound();
                        // SALVA IL PUNTEGGIO NEI RECORD DELL'ACCOUNT
                        if (currentUser) {
                            const pos = addScoreToUser(currentUser, score);
                            if (pos !== -1) {
                                isNewRecord = true;
                                newRecordPosition = pos;
                                playRecordSound();
                            }
                        }
                    }
                    continue;
                }
            }

            // Limite stelle
            if (stars.length > 100) {
                stars.splice(0, stars.length - 100);
            }
        }

        // ============================================================
        //  5. FUNZIONI DI DISEGNO
        // ============================================================

        // --- 5a. Sfondo spaziale ---
        function drawBackground() {
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Stelle fisse
            ctx.shadowBlur = 0;
            for (let i = 0; i < 100; i++) {
                const x = (i * 137 + 50) % canvas.width;
                const y = (i * 251 + 30) % canvas.height;
                const size = 0.5 + (i % 3) * 0.5;
                const brightness = 0.6 + Math.random() * 0.4;
                ctx.fillStyle = `rgba(255, 255, 255, ${brightness})`;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }

            // Pianeta 1
            const g1 = ctx.createRadialGradient(120, 100, 10, 120, 100, 60);
            g1.addColorStop(0, '#ff8c42');
            g1.addColorStop(0.7, '#b84a1c');
            g1.addColorStop(1, '#4a1a0a');
            ctx.shadowColor = '#ff8c42';
            ctx.shadowBlur = 30;
            ctx.beginPath();
            ctx.arc(120, 100, 60, 0, Math.PI * 2);
            ctx.fillStyle = g1;
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.strokeStyle = 'rgba(255,200,100,0.3)';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.ellipse(120, 100, 90, 25, -0.2, 0, Math.PI * 2);
            ctx.stroke();

            // Pianeta 2
            const g2 = ctx.createRadialGradient(700, 500, 15, 700, 500, 45);
            g2.addColorStop(0, '#4fc3ff');
            g2.addColorStop(0.5, '#1a7ab5');
            g2.addColorStop(1, '#0a2a4a');
            ctx.shadowColor = '#4fc3ff';
            ctx.shadowBlur = 25;
            ctx.beginPath();
            ctx.arc(700, 500, 45, 0, Math.PI * 2);
            ctx.fillStyle = g2;
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.beginPath();
            ctx.ellipse(690, 490, 20, 10, 0.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(710, 510, 15, 8, -0.3, 0, Math.PI * 2);
            ctx.fill();
        }

        // --- 5b. Menu iniziale ---
        function drawMenu() {
            drawBackground();

            ctx.textAlign = 'center';
            ctx.shadowColor = '#4af';
            ctx.shadowBlur = 50;

            // Titolo principale
            ctx.font = 'bold 72px Orbitron, sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.fillText('🚀 STAR', canvas.width / 2, 170);
            ctx.fillStyle = '#ffd700';
            ctx.fillText('CATCHER', canvas.width / 2, 260);

            // Sottotitolo
            ctx.shadowBlur = 10;
            ctx.shadowColor = 'black';
            ctx.font = '18px Orbitron, sans-serif';
            ctx.fillStyle = '#88aaff';
            ctx.fillText('Raccogli le stelle, batti il record!', canvas.width / 2, 310);

            // Account attivo
            ctx.font = '16px Orbitron, sans-serif';
            ctx.fillStyle = '#66dd88';
            ctx.shadowBlur = 10;
            ctx.fillText(
                currentUser ? `👤 ${currentUser}` : '👤 Nessun account',
                canvas.width / 2,
                350
            );

            // --- Pulsanti ---
            const btnY = 390;
            const btnW = 180;
            const btnH = 50;
            const gap = 25;

            // Pulsante PLAY
            const playX = canvas.width / 2 - btnW - gap / 2;
            const playCenterX = playX + btnW / 2;   // Centro del pulsante PLAY
            ctx.shadowBlur = 30;
            ctx.shadowColor = '#4af';
            ctx.fillStyle = '#2a6aff';
            ctx.beginPath();
            ctx.roundRect(playX, btnY, btnW, btnH, 12);
            ctx.fill();

            ctx.shadowBlur = 0;
            ctx.fillStyle = 'white';
            ctx.font = 'bold 24px Orbitron, sans-serif';
            ctx.fillText('▶ PLAY', playCenterX, btnY + 34);  // Centrato sul pulsante

            // Pulsante ACCOUNT
            const accX = canvas.width / 2 + gap / 2;
            const accCenterX = accX + btnW / 2;    // Centro del pulsante ACCOUNT
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#88aaff';
            ctx.fillStyle = '#3a3a6a';
            ctx.beginPath();
            ctx.roundRect(accX, btnY, btnW, btnH, 12);
            ctx.fill();

            ctx.shadowBlur = 0;
            ctx.fillStyle = '#88aaff';
            ctx.font = 'bold 22px Orbitron, sans-serif';
            ctx.fillText('👤 ACCOUNT', accCenterX, btnY + 34); // Centrato sul pulsante

            // --- Pulsante RECORDS (sotto) ---
            const recY = btnY + btnH + 20;
            const recW = 200;
            const recH = 40;
            const recX = canvas.width / 2 - recW / 2;
            const recCenterX = canvas.width / 2;    // Centro del pulsante RECORDS
            const recRect = { x: recX, y: recY, w: recW, h: recH };
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ffd700';
            ctx.fillStyle = '#2a2a4a';
            ctx.beginPath();
            ctx.roundRect(recX, recY, recW, recH, 10);
            ctx.fill();

            ctx.shadowBlur = 0;
            ctx.fillStyle = '#ffd700';
            ctx.font = '20px Orbitron, sans-serif';
            ctx.fillText('🏆 RECORDS', recCenterX, recY + 28); // Già centrato

            // Salva per il click detection
            menuButtons = [
                { rect: { x: playX, y: btnY, w: btnW, h: btnH }, action: 'play' },
                { rect: { x: accX, y: btnY, w: btnW, h: btnH }, action: 'account' },
                { rect: recRect, action: 'records' }
            ];

            // Ripristina textAlign
            ctx.textAlign = 'left';
            ctx.shadowBlur = 0;
        }

        // --- 5c. Schermata ACCOUNT ---
        function drawAccountScreen() {
            drawBackground();

            ctx.textAlign = 'center';
            ctx.shadowBlur = 30;
            ctx.shadowColor = '#4af';

            // Titolo
            ctx.font = 'bold 44px Orbitron, sans-serif';
            ctx.fillStyle = 'white';
            ctx.fillText('👤 ACCOUNT', canvas.width / 2, 150);

            ctx.shadowBlur = 10;
            ctx.shadowColor = 'black';
            ctx.font = '18px Orbitron, sans-serif';
            ctx.fillStyle = '#aaa';
            ctx.fillText('Inserisci il tuo nome (max 12 caratteri)', canvas.width / 2, 210);

            // Mostra il wrapper HTML (invece del campo su canvas)
            showMobileInput(true);

            ctx.textAlign = 'left';
            ctx.shadowBlur = 0;
        }

        // --- 5d. Stelle cadenti ---
        function drawFallingStars() {
            for (const star of stars) {
                ctx.save();
                ctx.translate(star.x, star.y);
                ctx.shadowColor = star.color;
                ctx.shadowBlur = 20;
                ctx.fillStyle = star.color;
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;

                const spikes = 5;
                const outerRadius = star.radius;
                const innerRadius = star.radius * 0.4;
                ctx.beginPath();
                for (let i = 0; i < spikes * 2; i++) {
                    const radius = i % 2 === 0 ? outerRadius : innerRadius;
                    const angle = (i * Math.PI) / spikes - Math.PI / 2;
                    const x = radius * Math.cos(angle);
                    const y = radius * Math.sin(angle);
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                ctx.restore();
            }
        }

        // --- 5e. Astronave ---
        function drawShip() {
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.shadowColor = '#4af';
            ctx.shadowBlur = 25;

            ctx.beginPath();
            ctx.ellipse(0, -5, 18, 12, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#4a8cff';
            ctx.fill();
            ctx.strokeStyle = '#8cf';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.beginPath();
            ctx.ellipse(0, -12, 10, 7, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#8cf';
            ctx.fill();
            ctx.strokeStyle = '#adf';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(-4, -14, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();

        // --- 5i. Funzione draw principale ---
        function draw() {
            switch (gameState) {
                case GAME_STATES.MENU:
                    drawMenu();
                    break;
                case GAME_STATES.ACCOUNT:
                    drawAccountScreen();
                    break;
                case GAME_STATES.PLAYING:
                    drawBackground();
                    drawFallingStars();
                    drawShip();
                    drawGameUI();
                    if (gameOver) drawGameOver();
                    break;
                case GAME_STATES.PAUSED:  // <--- NUOVO CASO
                    drawBackground();
                    drawFallingStars();
                    drawShip();
                    drawGameUI();
                    drawPauseScreen();    // <--- SOPRASTAMPA LA PAUSA
                    break;
            }
        }

        // ============================================================
        //  6. GESTIONE AZIONI MENU
        // ============================================================

        function handleMenuAction(action) {
            switch (action) {
                case 'play':
                    if (!currentUser) {
                        gameState = GAME_STATES.ACCOUNT;
                        accountInput = '';
                        showMobileInput(true);
                    } else {
                        startGame();
                    }
                    break;
                case 'account':
                    gameState = GAME_STATES.ACCOUNT;
                    accountInput = currentUser || '';
                    showMobileInput(true);
                    break;
                case 'records':
                    if (!currentUser) {
                        alert('Crea un account per vedere i tuoi record!');
                        gameState = GAME_STATES.ACCOUNT;
                        accountInput = '';
                        showMobileInput(true);
                    } else {
                        // Mostra la schermata records
                        // Per ora usiamo un alert semplice, ma possiamo espandere
                        const records = getUserRecords(currentUser);
                        const valid = records.filter(r => r > 0);
                        let msg = `📊 Record di ${currentUser}:\n\n`;
                        if (valid.length === 0) {
                            msg += 'Nessun record salvato. Gioca per crearne!';
                        } else {
                            for (let i = 0; i < Math.min(10, valid.length); i++) {
                                const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i + 1}.`;
                                msg += `${medal} ${valid[i]} punti\n`;
                            }
                        }
                        alert(msg);
                    }
                    break;
                case 'confirm':
                    if (accountInput.trim().length > 0) {
                        const newUser = accountInput.trim();
                        // Verifica che non sia vuoto e max 12 caratteri
                        if (newUser.length > 12) {
                            alert('Il nome deve essere massimo 12 caratteri!');
                            return;
                        }
                        currentUser = newUser;
                        // Assicura che l'utente abbia una entry nei record
                        getUserRecords(currentUser);
                        saveLastUser(currentUser);
                        resetGame();
                        gameState = GAME_STATES.MENU;
                        accountInput = '';
                        showMobileInput(false);
                    } else {
                        alert('Inserisci un nome!');
                    }
                    break;
                case 'cancel':
                    gameState = GAME_STATES.MENU;
                    accountInput = '';
                    showMobileInput(false);
                    break;
                case 'back':
                    gameState = GAME_STATES.MENU;
                    showMobileInput(false);
                    break;
                // --- NUOVI CASI PER GAME OVER ---
                case 'playAgain':
                    // Ricomincia subito la partita (restando in PLAYING)
                    resetGame();
                    gameState = GAME_STATES.PLAYING;
                    updateTouchVisibility();
                    break;

                case 'menu':
                    // Torna al menu principale
                    resetGame();
                    gameState = GAME_STATES.MENU;
                    updateTouchVisibility();
                    break;

                default:
                    break;
            }
            menuButtons = [];
        }

        // ============================================================
        //  7. INPUT: MOUSE E TASTIERA
        // ============================================================

        // --- Click sul canvas ---
        canvas.addEventListener('click', (event) => {
            const rect = canvas.getBoundingClientRect();
            const mx = event.clientX - rect.left;
            const my = event.clientY - rect.top;

            for (const btn of menuButtons) {
                const r = btn.rect;
                if (mx >= r.x && mx <= r.x + r.w && my >= r.y && my <= r.y + r.h) {
                    handleMenuAction(btn.action);
                    break;
                }
            }
        });

        // --- Mouse per movimento astronave ---
        canvas.addEventListener('mousemove', (event) => {
            if (gameState === GAME_STATES.PLAYING) {
                const rect = canvas.getBoundingClientRect();
                player.targetX = event.clientX - rect.left;
            }
        });

        // --- Tastiera (frecce e R) ---
        window.addEventListener('keydown', (event) => {
            if (gameState === GAME_STATES.PLAYING) {
                if (event.key === 'ArrowLeft') {
                    leftPressed = true;
                    event.preventDefault();
                }
                if (event.key === 'ArrowRight') {
                    rightPressed = true;
                    event.preventDefault();
                }
                if (event.key === 'r' || event.key === 'R') {
                    if (gameOver) {
                        resetGame();
                    }
                }
            }

            // Input per il campo account (lettere, numeri, underscore, max 12)
            if (gameState === GAME_STATES.ACCOUNT) {
                if (event.key === 'Backspace') {
                    accountInput = accountInput.slice(0, -1);
                    event.preventDefault();
                } else if (event.key.length === 1 && accountInput.length < 12) {
                    if (/^[a-zA-Z0-9_]$/.test(event.key)) {
                        accountInput += event.key;
                        event.preventDefault();
                    }
                }
            }
        });

        window.addEventListener('keyup', (event) => {
            if (event.key === 'ArrowLeft') {
                leftPressed = false;
                event.preventDefault();
            }
            if (event.key === 'ArrowRight') {
                rightPressed = false;
                event.preventDefault();
            }
        });

        window.addEventListener('keydown', (event) => {
            // --- TASTO PAUSA (P) ---
            if (event.key === 'p' || event.key === 'P') {
                if (gameState === GAME_STATES.PLAYING || gameState === GAME_STATES.PAUSED) {
                    togglePause();
                    event.preventDefault();
                }
            }
        });

        // --- PULSANTI TOUCH PER MOBILE ---
        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');

        // Pulsante SINISTRA (touch e mouse)
        btnLeft.addEventListener('mousedown', (e) => {
            e.preventDefault();
            touchLeft = true;
        });
        btnLeft.addEventListener('mouseup', (e) => {
            e.preventDefault();
            touchLeft = false;
        });
        btnLeft.addEventListener('mouseleave', (e) => {
            touchLeft = false;
        });
        btnLeft.addEventListener('touchstart', (e) => {
            e.preventDefault();
            touchLeft = true;
        });
        btnLeft.addEventListener('touchend', (e) => {
            e.preventDefault();
            touchLeft = false;
        });
        btnLeft.addEventListener('touchcancel', (e) => {
            touchLeft = false;
        });

        // Pulsante DESTRA (touch e mouse)
        btnRight.addEventListener('mousedown', (e) => {
            e.preventDefault();
            touchRight = true;
        });
        btnRight.addEventListener('mouseup', (e) => {
            e.preventDefault();
            touchRight = false;
        });
        btnRight.addEventListener('mouseleave', (e) => {
            touchRight = false;
        });
        btnRight.addEventListener('touchstart', (e) => {
            e.preventDefault();
            touchRight = true;
        });
        btnRight.addEventListener('touchend', (e) => {
            e.preventDefault();
            touchRight = false;
        });
        btnRight.addEventListener('touchcancel', (e) => {
            touchRight = false;
        });

        // Nascondi i pulsanti touch quando il gioco è in pausa o nel menu
        function updateTouchVisibility() {
            const controls = document.getElementById('touchControls');
            if (gameState === GAME_STATES.PLAYING && !gameOver) {
                controls.style.display = 'flex';
            } else {
                controls.style.display = 'none';
            }
        }

        // --- PULSANTI DEL WRAPPER ACCOUNT (mobile) ---
        document.getElementById('mobileConfirmBtn').addEventListener('click', () => {
            const input = document.getElementById('accountMobileInput');
            const name = input.value.trim();
            if (name.length > 0 && name.length <= 12) {
                accountInput = name;
                handleMenuAction('confirm');
            } else {
                alert('Inserisci un nome tra 1 e 12 caratteri!');
                input.focus();
            }
        });

        document.getElementById('mobileCancelBtn').addEventListener('click', () => {
            handleMenuAction('cancel');
        });

        // Invio con il tasto Enter sul campo input
        document.getElementById('accountMobileInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('mobileConfirmBtn').click();
            }
            if (e.key === 'Escape') {
                document.getElementById('mobileCancelBtn').click();
            }
        });

        // Chiama updateTouchVisibility() ogni volta che lo stato cambia
        // Aggiungi questa riga alla fine di startGame(), resetGame(), togglePause()
        // e in handleMenuAction() per i casi 'playAgain' e 'menu'

        // ============================================================
        //  8. POLYFILL per roundRect
        // ============================================================

        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
                if (r > w / 2) r = w / 2;
                if (r > h / 2) r = h / 2;
                this.moveTo(x + r, y);
                this.lineTo(x + w - r, y);
                this.quadraticCurveTo(x + w, y, x + w, y + r);
                this.lineTo(x + w, y + h - r);
                this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                this.lineTo(x + r, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - r);
                this.lineTo(x, y + r);
                this.quadraticCurveTo(x, y, x + r, y);
                return this;
            };
        }

        // ============================================================
        //  9. GAME LOOP
        // ============================================================

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // ============================================================
        //  10. AVVIA IL GIOCO!
        // ============================================================

        // Carica l'ultimo account usato
        const savedUser = loadLastUser();
        if (savedUser) {
            currentUser = savedUser;
            getUserRecords(currentUser); // Inizializza se non esiste
        }

        resetGame();
        gameLoop();
    </script>
