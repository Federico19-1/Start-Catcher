<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Star Catcher - Gioco Spaziale</title>
    <!-- Google Font per il titolo spaziale -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
           0. STILE PAGINA
        ============================================================ */
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0a0a1a;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        canvas {
            border: 2px solid #4a4a8a;
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(74, 74, 138, 0.5);
            cursor: pointer;
        }
    </style>
</head>

<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        /*============================================================
           1. SETUP CANVAS E CONTESTO
        ============================================================ */

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ============================================================
        //  2. STATO DEL GIOCO E VARIABILI GLOBALI
        // ============================================================

        // --- STATI DEL GIOCO ---
        const GAME_STATES = {
            MENU: 'menu',       // Menu iniziale
            PLAYING: 'playing'  // Gioco in corso
        };

        let gameState = GAME_STATES.MENU;  // Iniziamo dal MENU!

        // --- GIOCATORE ---
        const player = {
            x: 400,
            y: 550,
            radius: 100,
            targetX: 400
        };

        // --- STELLE E PUNTEGGIO ---
        let stars = [];
        let score = 0;
        let lives = 3;
        let gameOver = false;
        let leftPressed = false;
        let rightPressed = false;
        let isNewRecord = false;
        const MOVE_SPEED = 5;

        // --- PER IL MENU (click detection) ---
        let menuButtons = [];

        // ============================================================
        //  3. GESTIONE RECORD (localStorage)
        // ============================================================

        function saveHighScore(score) {
            const currentHigh = getHighScore();
            if (score > currentHigh) {
                localStorage.setItem('starCatcherHighScore', score.toString());
                return true;
            }
            return false;
        }

        function getHighScore() {
            const saved = localStorage.getItem('starCatcherHighScore');
            return saved ? parseInt(saved) : 0;
        }

        function saveScoreHistory(score) {
            let history = localStorage.getItem('starCatcherHistory');
            let scores = history ? JSON.parse(history) : [];
            scores.push(score);
            scores.sort((a, b) => b - a);
            if (scores.length > 5) {
                scores = scores.slice(0, 5);
            }
            localStorage.setItem('starCatcherHistory', JSON.stringify(scores));
        }

        function getScoreHistory() {
            const history = localStorage.getItem('starCatcherHistory');
            return history ? JSON.parse(history) : [];
        }

        // ============================================================
        //  4. FUNZIONI DI GIOCO
        // ============================================================

        // --- 4a. Crea una stella ---
        function createStar() {
            return {
                x: Math.random() * canvas.width,
                y: -10,
                radius: 8 + Math.random() * 10,
                speed: 1 + Math.random() * 3,
                color: `hsl(${Math.random() * 60 + 30}, 100%, 60%)`
            };
        }

        // --- 4b. Resetta il gioco ---
        function resetGame() {
            stars = [];
            score = 0;
            lives = 3;
            gameOver = false;
            isNewRecord = false;
            player.x = 400;
            player.y = 550;
            player.targetX = 400;
            leftPressed = false;
            rightPressed = false;
        }

        // --- 4c. Avvia il gioco dal menu ---
        function startGame() {
            resetGame();
            gameState = GAME_STATES.PLAYING;
        }

        // --- 4d. Aggiorna la logica del gioco ---
        function update() {
            // Se siamo nel menu o in game over, non aggiorniamo
            if (gameState !== GAME_STATES.PLAYING || gameOver) return;

            // Movimento astronave (mouse)
            player.x += (player.targetX - player.x) * 0.3;

            // Movimento astronave (frecce)
            if (leftPressed) player.x -= MOVE_SPEED;
            if (rightPressed) player.x += MOVE_SPEED;

            // Limiti astronave
            if (player.x < player.radius) player.x = player.radius;
            if (player.x > canvas.width - player.radius) player.x = canvas.width - player.radius;

            // Creazione nuove stelle
            if (Math.random() < 0.05) {
                stars.push(createStar());
            }

            // Aggiornamento stelle
            for (let i = stars.length - 1; i >= 0; i--) {
                const star = stars[i];
                star.y += star.speed;

                // Collisione con astronave
                const dx = player.x - star.x;
                const dy = player.y - star.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                const collisionDistance = player.radius + star.radius;

                if (distance < collisionDistance) {
                    score++;
                    stars.splice(i, 1);
                    continue;
                }

                // Stella uscita in basso
                if (star.y > canvas.height + star.radius) {
                    lives--;
                    stars.splice(i, 1);
                    if (lives <= 0) {
                        gameOver = true;
                        const newRecord = saveHighScore(score);
                        saveScoreHistory(score);
                        if (newRecord) {
                            isNewRecord = true;
                        }
                    }
                    continue;
                }
            }

            // Limite stelle
            if (stars.length > 100) {
                stars.splice(0, stars.length - 100);
            }
        }

        // ============================================================
        //  5. FUNZIONI DI DISEGNO
        // ============================================================

        // --- 5a. Sfondo spaziale ---
        function drawBackground() {
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Stelle fisse
            ctx.shadowBlur = 0;
            for (let i = 0; i < 100; i++) {
                const x = (i * 137 + 50) % canvas.width;
                const y = (i * 251 + 30) % canvas.height;
                const size = 0.5 + (i % 3) * 0.5;
                const brightness = 0.6 + Math.random() * 0.4;
                ctx.fillStyle = `rgba(255, 255, 255, ${brightness})`;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }

            // Pianeta 1
            const g1 = ctx.createRadialGradient(120, 100, 10, 120, 100, 60);
            g1.addColorStop(0, '#ff8c42');
            g1.addColorStop(0.7, '#b84a1c');
            g1.addColorStop(1, '#4a1a0a');
            ctx.shadowColor = '#ff8c42';
            ctx.shadowBlur = 30;
            ctx.beginPath();
            ctx.arc(120, 100, 60, 0, Math.PI * 2);
            ctx.fillStyle = g1;
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.strokeStyle = 'rgba(255,200,100,0.3)';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.ellipse(120, 100, 90, 25, -0.2, 0, Math.PI * 2);
            ctx.stroke();

            // Pianeta 2
            const g2 = ctx.createRadialGradient(700, 500, 15, 700, 500, 45);
            g2.addColorStop(0, '#4fc3ff');
            g2.addColorStop(0.5, '#1a7ab5');
            g2.addColorStop(1, '#0a2a4a');
            ctx.shadowColor = '#4fc3ff';
            ctx.shadowBlur = 25;
            ctx.beginPath();
            ctx.arc(700, 500, 45, 0, Math.PI * 2);
            ctx.fillStyle = g2;
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.beginPath();
            ctx.ellipse(690, 490, 20, 10, 0.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(710, 510, 15, 8, -0.3, 0, Math.PI * 2);
            ctx.fill();
        }

        // --- 5b. Menu iniziale ---
        function drawMenu() {
            drawBackground();

            ctx.textAlign = 'center';
            ctx.shadowColor = '#4af';
            ctx.shadowBlur = 50;

            // Titolo principale
            ctx.font = 'bold 72px Orbitron, sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.fillText('🚀 STAR', canvas.width / 2, 200);
            ctx.fillStyle = '#ffd700';
            ctx.fillText('CATCHER', canvas.width / 2, 290);

            // Sottotitolo
            ctx.shadowBlur = 10;
            ctx.shadowColor = 'black';
            ctx.font = '20px Orbitron, sans-serif';
            ctx.fillStyle = '#88aaff';
            ctx.fillText('Raccogli le stelle, batti il record!', canvas.width / 2, 340);

            // Pulsante PLAY
            const btnX = canvas.width / 2 - 120;
            const btnY = 400;
            const btnW = 240;
            const btnH = 60;

            ctx.shadowBlur = 30;
            ctx.shadowColor = '#4af';
            ctx.fillStyle = '#2a6aff';
            ctx.beginPath();
            ctx.roundRect(btnX, btnY, btnW, btnH, 15);
            ctx.fill();

            ctx.shadowBlur = 0;
            ctx.fillStyle = 'white';
            ctx.font = 'bold 32px Orbitron, sans-serif';
            ctx.fillText('▶ PLAY', canvas.width / 2, btnY + 42);

            // Salva il rettangolo per il click detection
            menuButtons = [
                { rect: { x: btnX, y: btnY, w: btnW, h: btnH }, action: 'play' }
            ];

            ctx.textAlign = 'left';
            ctx.shadowBlur = 0;
        }

        // --- 5c. Stelle cadenti ---
        function drawFallingStars() {
            for (const star of stars) {
                ctx.save();
                ctx.translate(star.x, star.y);
                ctx.shadowColor = star.color;
                ctx.shadowBlur = 20;
                ctx.fillStyle = star.color;
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;

                const spikes = 5;
                const outerRadius = star.radius;
                const innerRadius = star.radius * 0.4;
                ctx.beginPath();
                for (let i = 0; i < spikes * 2; i++) {
                    const radius = i % 2 === 0 ? outerRadius : innerRadius;
                    const angle = (i * Math.PI) / spikes - Math.PI / 2;
                    const x = radius * Math.cos(angle);
                    const y = radius * Math.sin(angle);
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                ctx.restore();
            }
        }

        // --- 5d. Astronave ---
        function drawShip() {
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.shadowColor = '#4af';
            ctx.shadowBlur = 25;

            ctx.beginPath();
            ctx.ellipse(0, -5, 18, 12, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#4a8cff';
            ctx.fill();
            ctx.strokeStyle = '#8cf';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.beginPath();
            ctx.ellipse(0, -12, 10, 7, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#8cf';
            ctx.fill();
            ctx.strokeStyle = '#adf';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(-4, -14, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(4, -14, 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#3a7add';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.moveTo(-20, 5);
            ctx.lineTo(-8, -2);
            ctx.lineTo(-8, 8);
            ctx.closePath();
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(20, 5);
            ctx.lineTo(8, -2);
            ctx.lineTo(8, 8);
            ctx.closePath();
            ctx.fill();

            ctx.shadowBlur = 30;
            ctx.shadowColor = '#f90';
            ctx.fillStyle = '#f90';
            ctx.beginPath();
            ctx.moveTo(-6, 12);
            ctx.lineTo(0, 22);
            ctx.lineTo(6, 12);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = '#fd0';
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.moveTo(-3, 12);
            ctx.lineTo(0, 18);
            ctx.lineTo(3, 12);
            ctx.closePath();
            ctx.fill();

            ctx.restore();
        }

        // --- 5e. UI di gioco ---
        function drawGameUI() {
            const highScore = getHighScore();

            ctx.font = 'bold 24px Orbitron, sans-serif';
            ctx.shadowColor = 'black';
            ctx.shadowBlur = 10;

            ctx.fillStyle = 'white';
            ctx.fillText(`⭐ Punteggio: ${score}`, 20, 40);

            ctx.fillStyle = '#ffd700';
            ctx.fillText(`🏆 Record: ${highScore}`, 20, 80);

            if (score === highScore && score > 0 && !gameOver) {
                ctx.shadowColor = '#ffd700';
                ctx.shadowBlur = 30;
                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 28px Orbitron, sans-serif';
                ctx.fillText('✦ NUOVO RECORD! ✦', canvas.width / 2 - 120, 130);
                ctx.shadowBlur = 0;
            }

            ctx.fillStyle = 'white';
            ctx.fillText(`❤️ x ${lives}`, canvas.width - 120, 40);
        }

        // --- 5f. Schermata GAME OVER ---
        function drawGameOver() {
            const highScore = getHighScore();

            ctx.shadowColor = '#ff0000';
            ctx.shadowBlur = 30;
            ctx.textAlign = 'center';

            ctx.font = 'bold 60px Orbitron, sans-serif';
            ctx.fillStyle = '#ff4444';
            ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 100);

            ctx.font = 'bold 30px Orbitron, sans-serif';
            ctx.fillStyle = 'white';
            ctx.shadowBlur = 10;
            ctx.fillText(`Punteggio: ${score}`, canvas.width / 2, canvas.height / 2 - 30);

            if (isNewRecord && score > 0) {
                ctx.shadowColor = '#ffd700';
                ctx.shadowBlur = 50;
                ctx.font = 'bold 48px Orbitron, sans-serif';
                ctx.fillStyle = '#ffd700';
                ctx.fillText('🎉 NUOVO RECORD! 🎉', canvas.width / 2, canvas.height / 2 + 50);

                for (let i = 0; i < 12; i++) {
                    const angle = (i / 12) * Math.PI * 2 + Date.now() / 1000;
                    const radius = 70 + Math.sin(Date.now() / 500 + i) * 20;
                    const x = canvas.width / 2 + Math.cos(angle) * radius;
                    const y = canvas.height / 2 + 50 + Math.sin(angle) * radius * 0.5;
                    ctx.font = '24px Arial';
                    ctx.fillStyle = ['⭐', '✨', '🌟', '💫', '🎊', '🎉'][i % 6];
                    ctx.fillText('✨', x, y);
                }
            } else {
                ctx.font = '22px Orbitron, sans-serif';
                ctx.fillStyle = '#aaa';
                ctx.shadowBlur = 10;
                ctx.fillText(`Record attuale: ${highScore}`, canvas.width / 2, canvas.height / 2 + 50);
            }

            const history = getScoreHistory();
            if (history.length > 0) {
                ctx.font = '18px Orbitron, sans-serif';
                ctx.fillStyle = '#ffd700';
                ctx.shadowBlur = 10;
                ctx.fillText('🏆 TOP 5:', canvas.width / 2, canvas.height / 2 + 110);

                for (let i = 0; i < history.length; i++) {
                    ctx.fillStyle = i === 0 ? '#ffd700' : '#ccc';
                    ctx.font = i === 0 ? 'bold 20px Orbitron, sans-serif' : '16px Orbitron, sans-serif';
                    ctx.fillText(
                        `${i + 1}. ${history[i]} punti`,
                        canvas.width / 2,
                        canvas.height / 2 + 150 + i * 28
                    );
                }
            }

            ctx.font = 'bold 22px Orbitron, sans-serif';
            ctx.fillStyle = 'white';
            ctx.shadowBlur = 10;
            ctx.fillText('Premi "R" per ricominciare', canvas.width / 2, canvas.height / 2 + 280);
            ctx.textAlign = 'left';
            ctx.shadowBlur = 0;
        }

        // --- 5g. Funzione draw principale ---
        function draw() {
            if (gameState === GAME_STATES.MENU) {
                drawMenu();
                return;
            }

            // Stato PLAYING
            drawBackground();
            drawFallingStars();
            drawShip();
            drawGameUI();
            if (gameOver) {
                drawGameOver();
            }
        }

        // ============================================================
        //  6. INPUT: MOUSE E TASTIERA
        // ============================================================

        // --- Click sul canvas (per menu) ---
        canvas.addEventListener('click', (event) => {
            const rect = canvas.getBoundingClientRect();
            const mx = event.clientX - rect.left;
            const my = event.clientY - rect.top;

            // Se siamo nel menu, controlla se clicca su PLAY
            if (gameState === GAME_STATES.MENU) {
                for (const btn of menuButtons) {
                    const r = btn.rect;
                    if (mx >= r.x && mx <= r.x + r.w && my >= r.y && my <= r.y + r.h) {
                        if (btn.action === 'play') {
                            startGame();
                        }
                        break;
                    }
                }
            }
        });

        // --- Mouse per movimento astronave ---
        canvas.addEventListener('mousemove', (event) => {
            if (gameState === GAME_STATES.PLAYING) {
                const rect = canvas.getBoundingClientRect();
                player.targetX = event.clientX - rect.left;
            }
        });

        // --- Tastiera ---
        window.addEventListener('keydown', (event) => {
            if (gameState === GAME_STATES.PLAYING) {
                if (event.key === 'ArrowLeft') {
                    leftPressed = true;
                    event.preventDefault();
                }
                if (event.key === 'ArrowRight') {
                    rightPressed = true;
                    event.preventDefault();
                }
                if (event.key === 'r' || event.key === 'R') {
                    if (gameOver) {
                        resetGame();
                        // Resta in PLAYING ma ricomincia
                    }
                }
            }
        });

        window.addEventListener('keyup', (event) => {
            if (event.key === 'ArrowLeft') {
                leftPressed = false;
                event.preventDefault();
            }
            if (event.key === 'ArrowRight') {
                rightPressed = false;
                event.preventDefault();
            }
        });

        // --- Tasto R sempre attivo (anche dal menu) ---
        window.addEventListener('keydown', (event) => {
            if (event.key === 'r' || event.key === 'R') {
                if (gameState === GAME_STATES.PLAYING && gameOver) {
                    resetGame();
                }
            }
        });

        // ============================================================
        //  7. POLYFILL per roundRect (se non supportato)
        // ============================================================

        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
                if (r > w / 2) r = w / 2;
                if (r > h / 2) r = h / 2;
                this.moveTo(x + r, y);
                this.lineTo(x + w - r, y);
                this.quadraticCurveTo(x + w, y, x + w, y + r);
                this.lineTo(x + w, y + h - r);
                this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                this.lineTo(x + r, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - r);
                this.lineTo(x, y + r);
                this.quadraticCurveTo(x, y, x + r, y);
                return this;
            };
        }

        // ============================================================
        //  8. GAME LOOP
        // ============================================================

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // ============================================================
        //  9. AVVIA IL GIOCO!
        // ============================================================

        resetGame();
        gameLoop();
    </script>
</body>

</html>
